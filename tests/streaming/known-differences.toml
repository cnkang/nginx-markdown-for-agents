[[difference]]
id = "DIFF-CHUNK-WHITESPACE-ONLY"
description = "Chunk split may cause whitespace-only drift while preserving token sequence"
trigger = "whitespace-only-chunk-drift"
reason = "Streaming tokenizer/commit boundary currently has known whitespace normalization instability under extreme chunk fragmentation"
acceptable = true
fix_version = "0.6.0"
diff_contains = "whitespace-only-chunk-drift"

[[difference]]
id = "DIFF-PARITY-WHITESPACE-ONLY"
description = "Full-buffer and streaming outputs can diverge only in whitespace normalization for known fixtures"
trigger = "whitespace-only-parity-drift"
reason = "Streaming path still has known whitespace normalization drift in pre-heading and list indentation regions"
acceptable = true
fix_version = "0.6.0"
diff_contains = "whitespace-only-parity-drift"

[[difference]]
id = "DIFF-PARITY-ORDERED-LIST-NUMBERING"
description = "Streaming may normalize ordered-list numbering to monotonic values while full-buffer preserves source numbering"
trigger = "ordered-list-numbering-drift"
reason = "Streaming structural state machine currently rewrites ordered-list item numbers in some mixed/empty-item inputs"
acceptable = true
fix_version = "0.6.0"
diff_contains = "ordered-list-numbering-drift"

