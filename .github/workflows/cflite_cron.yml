name: ClusterFuzzLite Corpus Prune

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          language: rust
          sanitizer: address
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        if: vars.CFLITE_STORAGE_REPO != ''
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: prune
          sanitizer: address
          storage-repo: ${{ vars.CFLITE_STORAGE_REPO }}
          storage-repo-branch: ${{ vars.CFLITE_STORAGE_REPO_BRANCH || 'main' }}

      - name: Skip prune when corpus repository is missing
        if: vars.CFLITE_STORAGE_REPO == ''
        run: |
          echo "Skip corpus prune: vars.CFLITE_STORAGE_REPO is not configured."
