name: Homebrew Formula Gate

on:
  pull_request:
    branches: [main, master]
    paths:
      - "packaging/homebrew/**"
      - "packaging/checksums.sha256"
      - "packaging/scripts/install-verified-rustup.sh"
      - "packaging/scripts/render_homebrew_formula.py"
      - "packaging/scripts/verify-checksum.sh"
      - "packaging/scripts/verify_homebrew_formula.py"
      - ".github/workflows/homebrew-formula-gate.yml"
      - "Makefile"
      - "components/**"
  push:
    branches: [main, master]
    paths:
      - "packaging/homebrew/**"
      - "packaging/checksums.sha256"
      - "packaging/scripts/install-verified-rustup.sh"
      - "packaging/scripts/render_homebrew_formula.py"
      - "packaging/scripts/verify-checksum.sh"
      - "packaging/scripts/verify_homebrew_formula.py"
      - ".github/workflows/homebrew-formula-gate.yml"
      - "Makefile"
      - "components/**"

permissions:
  contents: read

jobs:
  brew-formula-check:
    name: Formula audit/install/test
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Homebrew environment
        shell: bash
        run: |
          set -euo pipefail
          brew --version
          brew update-reset

      - name: Audit local formula
        shell: bash
        run: |
          set -euo pipefail
          CORE_FORMULA_PATH="$(brew --repository homebrew/core)/Formula/n/nginx-markdown-module.rb"
          ARCHIVE_URL="https://github.com/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz"
          ARCHIVE_PATH="${RUNNER_TEMP}/nginx-markdown-source.tar.gz"
          curl --proto '=https' --tlsv1.2 -fsSL \
            -o "${ARCHIVE_PATH}" "${ARCHIVE_URL}"
          ARCHIVE_SHA="$(shasum -a 256 "${ARCHIVE_PATH}" | awk '{print $1}')"
          CURRENT_VERSION="$(
            sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' \
              components/rust-converter/Cargo.toml | head -1
          )"
          if [[ -z "${CURRENT_VERSION}" ]]; then
            echo "::error::Cannot derive current version from components/rust-converter/Cargo.toml" >&2
            exit 1
          fi
          python3 packaging/scripts/render_homebrew_formula.py \
            --source packaging/homebrew/nginx-markdown-module.rb \
            --url "${ARCHIVE_URL}" \
            --sha256 "${ARCHIVE_SHA}" \
            --version "${CURRENT_VERSION}" \
            > "${CORE_FORMULA_PATH}"
          python3 packaging/scripts/verify_homebrew_formula.py \
            --trusted-template packaging/homebrew/nginx-markdown-module.rb \
            --candidate "${CORE_FORMULA_PATH}" \
            --url "${ARCHIVE_URL}" \
            --sha256 "${ARCHIVE_SHA}" \
            --version "${CURRENT_VERSION}"
          brew audit --strict nginx-markdown-module

      - name: Install local formula from source
        shell: bash
        run: |
          set -euo pipefail
          CORE_FORMULA_PATH="$(brew --repository homebrew/core)/Formula/n/nginx-markdown-module.rb"
          brew install --build-from-source "${CORE_FORMULA_PATH}"

      - name: Run formula test
        shell: bash
        run: |
          set -euo pipefail
          brew test nginx-markdown-module
