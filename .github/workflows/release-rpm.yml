name: "Legacy: Release RPM (nginx 1.26.3 only)"

# ⚠️ LEGACY COMPATIBILITY WORKFLOW — DO NOT USE FOR OFFICIAL RELEASES ⚠️
# release-packages.yml is the canonical release package workflow; this is a
# legacy compatibility workflow kept for direct RPM artifact builds.
# Do not add new features here; route all changes to release-packages.yml.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Module version to build (e.g. 0.7.0)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Module version to build'
        required: true
        type: string

permissions: {}

env:
  RUST_TOOLCHAIN: 1.97.0
  RUST_FEATURES: streaming,incremental

jobs:
  build-rpm:
    name: RPM - ${{ matrix.os }} - ${{ matrix.arch }} - nginx-${{ matrix.nginx_channel }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [almalinux-9, amazon-linux-2023]
        arch: [amd64, arm64]
        # Stable-only by design. Add channels only with checksum coverage,
        # package artifact flow, smoke matrix, and release-gate updates.
        nginx_channel: [stable]
    container:
      image: ${{ matrix.os == 'almalinux-9' && 'almalinux:9' || 'amazonlinux:2023' }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Install system dependencies
        run: |
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y \
              gcc \
              gcc-c++ \
              make \
              pcre-devel \
              zlib-devel \
              openssl-devel \
              rpm-build \
              git \
              curl \
              which \
              tar \
              gzip
          else
            yum install -y \
              gcc \
              gcc-c++ \
              make \
              pcre-devel \
              zlib-devel \
              openssl-devel \
              rpm-build \
              git \
              curl \
              which \
              tar \
              gzip
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          bash ./packaging/scripts/install-verified-rustup.sh \
            --arch "${{ matrix.arch }}" \
            --toolchain "${RUST_TOOLCHAIN}"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Validate package version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          ./packaging/scripts/validate-version.sh "$INPUT_VERSION"

      - name: Resolve NGINX version
        id: nginx_version
        run: |
          . "$HOME/.cargo/env"
          CHANNEL="${{ matrix.nginx_channel }}"
          case "${CHANNEL}" in
            stable)
              NGINX_VERSION="1.26.3"
              ;;
            *)
              echo "ERROR: Unsupported NGINX channel: ${CHANNEL}" >&2
              exit 1
              ;;
          esac
          echo "version=${NGINX_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building for NGINX ${NGINX_VERSION} (${CHANNEL} channel)"

      - name: Download and prepare NGINX source
        env:
          NGINX_VERSION: ${{ steps.nginx_version.outputs.version }}
        run: |
          . "$HOME/.cargo/env"
          mkdir -p /tmp/nginx-build
          cd /tmp/nginx-build
          curl -sSfL "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz" -o nginx.tar.gz
          chmod +x "${GITHUB_WORKSPACE}/packaging/scripts/verify-checksum.sh"
          "${GITHUB_WORKSPACE}/packaging/scripts/verify-checksum.sh" \
            -f nginx.tar.gz \
            -i "nginx-${NGINX_VERSION}" \
            -c "${GITHUB_WORKSPACE}/packaging/checksums.sha256"
          tar xzf nginx.tar.gz
          echo "NGINX_SRC=/tmp/nginx-build/nginx-${NGINX_VERSION}" >> "$GITHUB_ENV"

      - name: Build Rust library
        run: |
          . "$HOME/.cargo/env"
          case "${{ matrix.arch }}" in
            amd64) RUST_TARGET="x86_64-unknown-linux-gnu" ;;
            arm64) RUST_TARGET="aarch64-unknown-linux-gnu" ;;
            *)
              echo "ERROR: unsupported arch: ${{ matrix.arch }}" >&2
              exit 1
              ;;
          esac
          echo "RUST_TARGET=${RUST_TARGET}" >> "$GITHUB_ENV"
          rustup target add "${RUST_TARGET}"
          cd components/rust-converter
          cargo build --release --locked --target "${RUST_TARGET}" --features "${RUST_FEATURES}"

      - name: Verify Rust static library
        run: |
          RUST_LIB="components/rust-converter/target/${RUST_TARGET}/release/libnginx_markdown_converter.a"
          if [[ ! -f "${RUST_LIB}" ]]; then
            echo "ERROR: Rust static library not found: ${RUST_LIB}" >&2
            exit 1
          fi
          echo "Rust static library verified: ${RUST_LIB}"
        shell: bash

      - name: Compile NGINX module
        env:
          NGINX_VERSION: ${{ steps.nginx_version.outputs.version }}
        run: |
          . "$HOME/.cargo/env"
          mkdir -p "$GITHUB_WORKSPACE/build"
          cd "${NGINX_SRC}"
          ./configure \
            --with-compat \
            --add-dynamic-module="$GITHUB_WORKSPACE/components/nginx-module"
          make modules
          cp objs/ngx_http_markdown_filter_module.so "$GITHUB_WORKSPACE/build/"
        shell: bash

      - name: Prepare rpmbuild tree
        run: |
          if [[ ! -f "build/ngx_http_markdown_filter_module.so" ]]; then
            echo "ERROR: Module .so not found in build/" >&2
            exit 1
          fi

          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Create source tarball for rpmbuild
          PKG_NAME="nginx-module-markdown-for-agents"
          PKG_VERSION="${{ inputs.version }}"
          TARBALL_DIR="${PKG_NAME}-${PKG_VERSION}"

          mkdir -p "/tmp/${TARBALL_DIR}"
          mkdir -p "/tmp/${TARBALL_DIR}/docs/guides"
          cp build/ngx_http_markdown_filter_module.so "/tmp/${TARBALL_DIR}/"
          cp README.md "/tmp/${TARBALL_DIR}/"
          cp docs/guides/INSTALL.md "/tmp/${TARBALL_DIR}/docs/guides/"
          cp docs/COMPATIBILITY.md "/tmp/${TARBALL_DIR}/docs/"
          cp LICENSE "/tmp/${TARBALL_DIR}/"

          cd /tmp
          tar czf ~/rpmbuild/SOURCES/${PKG_NAME}-${PKG_VERSION}.tar.gz "${TARBALL_DIR}"

          # Copy SPEC file
          cp "$GITHUB_WORKSPACE/packaging/rpm/SPECS/nginx-module-markdown.spec" \
            ~/rpmbuild/SPECS/

      - name: Build RPM package
        env:
          PKG_VERSION: ${{ inputs.version }}
        run: |
          . "$HOME/.cargo/env"
          NGINX_VERSION="${{ steps.nginx_version.outputs.version }}"
          NGINX_MAJOR="$(printf '%s\n' "${NGINX_VERSION}" | cut -d. -f1)"
          NGINX_MINOR="$(printf '%s\n' "${NGINX_VERSION}" | cut -d. -f2)"
          NGINX_VERSION_FLOOR="${NGINX_MAJOR}.${NGINX_MINOR}.0"
          NGINX_VERSION_CEIL="${NGINX_MAJOR}.$((NGINX_MINOR + 1)).0"
          rpmbuild -bb \
            --define "_topdir $HOME/rpmbuild" \
            --define "version ${PKG_VERSION}" \
            --define "nginx_version ${NGINX_VERSION}" \
            --define "nginx_version_floor ${NGINX_VERSION_FLOOR}" \
            --define "nginx_version_ceil ${NGINX_VERSION_CEIL}" \
            ~/rpmbuild/SPECS/nginx-module-markdown.spec

      - name: Collect RPM artifacts
        run: |
          mkdir -p dist
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} dist/ \;
          echo "Built RPM packages:"
          ls -la dist/*.rpm
          for rpm_file in dist/*.rpm; do
            echo "--- ${rpm_file} ---"
            rpm -qip "${rpm_file}"
          done
          bash tools/release/gates/check_install_layout.sh dist/*.rpm

      - name: Upload RPM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pkg-rpm-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.nginx_channel }}
          path: dist/*.rpm
          if-no-files-found: error
