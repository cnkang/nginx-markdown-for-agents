# Release Packages — Unified DEB/RPM build, test, sign, and publish pipeline
#
# Architecture: prepare → build (matrix) → package (matrix) → smoke-test (matrix) → integrity → publish
# Tag releases also run release-gate after smoke-test; publish waits for both
# release-gate and integrity to pass.
#
# Triggers:
#   - Tag push (v*): full pipeline ending with GitHub Release upload
#   - workflow_dispatch: full pipeline ending with workflow artifact upload
#
# Security:
#   - Workflow-level permissions: {} (no permissions by default)
#   - Each job grants only the minimum permissions it needs
#   - All third-party actions MUST be pinned to full SHA commit hashes (Req 9.6)
#   - GPG signing runs in a Protected Environment with required reviewers
#   - workflow_dispatch input is validated before use (Req 9.7)
#
# Matrix generation:
#   The prepare job reads tools/release-matrix.json and extracts all NGINX
#   versions with support_tier=="full" and os_type=="glibc" (DEB/RPM targets).
#   This ensures the release workflow always builds packages for every version
#   declared in the release matrix, preventing matrix/workflow drift.
#
# Extension points (see also packaging/matrix.yaml for authoritative matrix reference):
#   - Add new NGINX versions: update tools/release-matrix.json with the new
#     version entry (support_tier: "full", os_type: "glibc") and add its
#     SHA256 checksum to packaging/checksums.sha256. No workflow changes needed.
#   - Add new target platforms: add entries to the smoke-test matrix include list
#     with the appropriate container image and format, then update
#     packaging/matrix.yaml smoke_test_containers accordingly.
#   - Enable GPG signing: configure GPG_PRIVATE_KEY, GPG_PASSPHRASE, GPG_KEY_ID secrets
#     in the Protected Environment "release-signing" with required reviewers.
#     Tag releases ALWAYS run the signing job; no repository variable needed.
#
# GPG Signing Policy (v0.7.0):
#   Tag releases: signing is MANDATORY. The integrity-signing job always runs
#   for tag pushes and the publish job requires signing to succeed. If GPG
#   secrets are missing, the pipeline fails early with a clear preflight error.
#   workflow_dispatch: signing is skipped; publish proceeds with SHA256SUMS-only
#   integrity verification (useful for testing the build/package pipeline).
#
# Path filters note:
#   GitHub Actions path filters only apply to push events on branches, NOT tag pushes.
#   For tag pushes (v*), the workflow always runs regardless of path filters.
#   The paths below are documented for reference and would apply if branch-based
#   push triggers were added for testing:
#     - packaging/**
#     - components/**
#     - .github/workflows/release-packages.yml

name: Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Optional version override (format: MAJOR.MINOR.PATCH, e.g. 0.7.0).
          Prerelease suffixes (e.g. 0.7.0-rc.1) are rejected because they are
          incompatible with RPM versioning. If empty, version is derived from
          the git ref.
        required: false
        type: string

# Workflow-level: no permissions granted by default (Req 9.5).
# Each job declares its own minimum required permissions.
permissions: {}

# Jobs:
#   - prepare:             Resolve build matrix from tools/release-matrix.json
#   - build:               Compile Rust library + NGINX dynamic module (matrix)
#   - package:             Generate .deb/.rpm via nFPM (matrix)
#   - smoke-test:          Container install + module load verification (matrix)
#   - release-gate:        Tag-only release governance and artifact layout gate
#   - integrity-checksums: SHA256SUMS generation (no protected environment)
#   - integrity-signing:   Optional GPG signing (protected environment, tag only)
#   - publish:             Upload to GitHub Release (tag) or workflow artifacts (dispatch)
#
# All third-party actions in jobs below MUST use full SHA pinning (Req 9.6).
# Example: actions/checkout@<full-sha> # v4.x.x
#
# release-packages.yml is the canonical release package workflow and official release path.

env:
  RUST_TOOLCHAIN: 1.91.1
  RUST_FEATURES: streaming,incremental

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Prepare Job: Resolve build matrix from tools/release-matrix.json
  # Extracts unique NGINX versions with full glibc support to drive the
  # build/package/smoke-test matrices dynamically.
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    name: Resolve Package Matrix
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      nginx_versions: ${{ steps.resolve.outputs.nginx_versions }}
      smoke_matrix: ${{ steps.resolve.outputs.smoke_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Resolve matrix from release-matrix.json
        id: resolve
        run: |
          python3 - <<'PY'
          import json, os

          with open("tools/release-matrix.json", "r") as f:
              data = json.load(f)

          # Extract unique NGINX versions with full support and glibc os_type
          # (DEB/RPM packages target glibc-based distros)
          glibc_full = [
              e for e in data.get("matrix", [])
              if e.get("support_tier") == "full" and e.get("os_type") == "glibc"
          ]

          versions = sorted(
              set(e["nginx"] for e in glibc_full),
              key=lambda v: tuple(int(p) for p in v.split("."))
          )

          if len(versions) == 0:
              print("ERROR: No NGINX versions with support_tier=full and os_type=glibc found in tools/release-matrix.json")
              raise SystemExit(1)

          # Build smoke-test matrix: each version × representative distros × archs
          smoke_containers = {
              "deb": [
                  {"container": "ubuntu:22.04", "arch": "amd64"},
                  {"container": "ubuntu:24.04", "arch": "amd64"},
                  {"container": "debian:12", "arch": "amd64"},
                  {"container": "ubuntu:24.04", "arch": "arm64"},
              ],
              "rpm": [
                  {"container": "almalinux:9", "arch": "amd64"},
                  {"container": "amazonlinux:2023", "arch": "amd64"},
                  {"container": "almalinux:9", "arch": "arm64"},
              ],
          }

          smoke_matrix = []
          for version in versions:
              for fmt, containers in smoke_containers.items():
                  for entry in containers:
                      smoke_matrix.append({
                          "container": entry["container"],
                          "format": fmt,
                          "nginx_version": version,
                          "arch": entry["arch"],
                      })

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"nginx_versions={json.dumps(versions)}\n")
              out.write(f"smoke_matrix={json.dumps(smoke_matrix)}\n")

          print(f"Resolved {len(versions)} NGINX versions: {versions}")
          print(f"Smoke test matrix: {len(smoke_matrix)} entries")
          PY
        shell: bash

  build:
    name: Build - nginx-${{ matrix.nginx_version }} - ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    container: almalinux:9
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        nginx_version: ${{ fromJson(needs.prepare.outputs.nginx_versions) }}
        arch: [amd64, arm64]

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc \
            make \
            binutils \
            ca-certificates \
            curl-minimal \
            pcre2-devel \
            zlib-devel \
            openssl-devel \
            tar \
            gzip \
            findutils \
            file \
            git
          dnf clean all
        shell: bash

      - name: Derive and validate version
        id: version
        env:
          TAG_REF: ${{ github.ref }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION}"
          elif printf '%s' "${TAG_REF}" | grep -qE '^refs/tags/v'; then
            VERSION="${TAG_REF#refs/tags/v}"
          else
            echo "ERROR: Cannot derive version — not a tag push and no version input provided" >&2
            exit 1
          fi
          echo "raw_version=${VERSION}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Validate version
        env:
          VERSION: ${{ steps.version.outputs.raw_version }}
        run: |
          ./packaging/scripts/validate-version.sh "${VERSION}"
          echo "PKG_VERSION=${VERSION}" >> "$GITHUB_ENV"
        shell: bash

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain "${RUST_TOOLCHAIN}"
          echo "${HOME}/.cargo/bin" >> "$GITHUB_PATH"
          "${HOME}/.cargo/bin/rustc" --version
          "${HOME}/.cargo/bin/cargo" --version
        shell: bash

      - name: Determine Rust target triple
        run: |
          case "${{ matrix.arch }}" in
            amd64) RUST_TARGET="x86_64-unknown-linux-gnu" ;;
            arm64) RUST_TARGET="aarch64-unknown-linux-gnu" ;;
            *)
              echo "ERROR: unsupported arch: ${{ matrix.arch }}" >&2
              exit 1
              ;;
          esac
          echo "RUST_TARGET=${RUST_TARGET}" >> "$GITHUB_ENV"
          echo "Rust target triple: ${RUST_TARGET}"
        shell: bash

      - name: Download NGINX source
        env:
          NGINX_VERSION: ${{ matrix.nginx_version }}
        run: |
          NGINX_TARBALL="nginx-${NGINX_VERSION}.tar.gz"
          NGINX_URL="https://nginx.org/download/${NGINX_TARBALL}"
          curl -fsSL -o "${NGINX_TARBALL}" "${NGINX_URL}"
          chmod +x packaging/scripts/verify-checksum.sh
          packaging/scripts/verify-checksum.sh \
            -f "${NGINX_TARBALL}" \
            -i "nginx-${NGINX_VERSION}"
          tar xzf "${NGINX_TARBALL}"
          echo "NGINX_SRC=${GITHUB_WORKSPACE}/nginx-${NGINX_VERSION}" >> "$GITHUB_ENV"
        shell: bash

      - name: Build Rust converter
        run: |
          rustup target add "${RUST_TARGET}"
          cd components/rust-converter
          cargo build --release --locked --target "${RUST_TARGET}" --features "${RUST_FEATURES}"
        shell: bash

      - name: Verify required FFI symbols in Rust static library
        run: |
          RUST_LIB="components/rust-converter/target/${RUST_TARGET}/release/libnginx_markdown_converter.a"
          if [[ ! -f "${RUST_LIB}" ]]; then
            echo "ERROR: Rust static library not found: ${RUST_LIB}" >&2
            exit 1
          fi
          command -v nm >/dev/null 2>&1 || {
            echo "ERROR: nm not found; install binutils in the release build image" >&2
            exit 1
          }
          MISSING=0
          for sym in markdown_streaming_new markdown_streaming_new_with_code \
                     markdown_incremental_new markdown_incremental_new_with_code \
                     markdown_decompress_bounded; do
            if ! nm -g "${RUST_LIB}" 2>/dev/null | awk '{print $NF}' | grep -Eq "^_?${sym}$"; then
              echo "ERROR: Required symbol ${sym} not found in ${RUST_LIB}" >&2
              MISSING=1
            else
              echo "  OK: ${sym}" >&2
            fi
          done
          if [[ "${MISSING}" -ne 0 ]]; then
            echo "ERROR: One or more required FFI symbols missing from release build" >&2
            exit 1
          fi
          echo "All required FFI symbols verified." >&2
        shell: bash

      - name: Configure NGINX with dynamic module
        env:
          NGINX_VERSION: ${{ matrix.nginx_version }}
        run: |
          cd "${NGINX_SRC}"
          ./configure \
            --with-compat \
            --add-dynamic-module="${GITHUB_WORKSPACE}/components/nginx-module"
        shell: bash

      - name: Build module
        run: |
          cd "${NGINX_SRC}"
          make modules
        shell: bash

      - name: Copy .so to build directory
        run: |
          mkdir -p build
          cp "${NGINX_SRC}/objs/ngx_http_markdown_filter_module.so" build/
        shell: bash

      - name: Verify ELF shared object
        run: |
          file_output="$(file build/ngx_http_markdown_filter_module.so)"
          echo "${file_output}"
          if ! printf '%s' "${file_output}" | grep -q "ELF"; then
            echo "ERROR: build/ngx_http_markdown_filter_module.so is not a valid ELF file" >&2
            exit 1
          fi
        shell: bash

      - name: Verify required FFI symbols
        run: |
          echo "=== Verifying required FFI symbols in module ===" >&2
          REQUIRED_SYMBOLS=(
            markdown_streaming_new
            markdown_streaming_new_with_code
            markdown_streaming_feed
            markdown_streaming_finalize
            markdown_streaming_free
            markdown_streaming_abort
            markdown_streaming_output_free
            markdown_incremental_new
            markdown_incremental_new_with_code
            markdown_incremental_feed
            markdown_incremental_finalize
            markdown_incremental_free
            markdown_decompress_bounded
            markdown_decompress_free
            markdown_convert
            markdown_converter_new
            markdown_converter_free
            markdown_result_free
          )
          MISSING=()
          for sym in "${REQUIRED_SYMBOLS[@]}"; do
            if ! nm -D build/ngx_http_markdown_filter_module.so \
                | awk '$2 != "U" && $NF == "'"${sym}"'" {found=1} END {exit !found}'; then
              MISSING+=("${sym}")
            fi
          done
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "ERROR: Missing required FFI symbols (defined exports):" >&2
            printf '  - %s\n' "${MISSING[@]}" >&2
            exit 1
          fi
          echo "All ${#REQUIRED_SYMBOLS[@]} required FFI symbols verified as defined exports." >&2
        shell: bash

      - name: Upload module artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: module-so-${{ matrix.nginx_version }}-${{ matrix.arch }}
          path: build/ngx_http_markdown_filter_module.so
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Package Job: Generate .deb/.rpm via nFPM (matrix)
  # Consumes the compiled .so from the build job and produces distribution
  # packages following spec 31 naming conventions.
  # ─────────────────────────────────────────────────────────────────────────────
  package:
    name: Package - nginx-${{ matrix.nginx_version }} - ${{ matrix.arch }}
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        nginx_version: ${{ fromJson(needs.prepare.outputs.nginx_versions) }}
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: module-so-${{ matrix.nginx_version }}-${{ matrix.arch }}
          path: build/

      - name: Install nFPM
        run: |
          NFPM_VERSION="2.46.3"
          NFPM_TARBALL="nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          NFPM_URL="https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/${NFPM_TARBALL}"
          curl -fsSL -o "${NFPM_TARBALL}" "${NFPM_URL}"
          chmod +x packaging/scripts/verify-checksum.sh
          packaging/scripts/verify-checksum.sh \
            -f "${NFPM_TARBALL}" \
            -i "nfpm-${NFPM_VERSION}-linux-x86_64"
          mkdir -p /tmp/nfpm-extract
          tar -xz -C /tmp/nfpm-extract -f "${NFPM_TARBALL}"
          if [[ ! -f /tmp/nfpm-extract/nfpm ]]; then
            echo "ERROR: nfpm binary not found in tarball" >&2; exit 1
          fi
          sudo cp /tmp/nfpm-extract/nfpm /usr/local/bin/nfpm
          sudo chmod 755 /usr/local/bin/nfpm
          rm -rf /tmp/nfpm-extract "${NFPM_TARBALL}"
          nfpm --version
        shell: bash

      - name: Set packaging environment variables
        id: pkg-env
        env:
          TAG_REF: ${{ github.ref }}
          INPUT_VERSION: ${{ inputs.version }}
          NGINX_VERSION: ${{ matrix.nginx_version }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          # Determine package version
          if [[ -n "${INPUT_VERSION}" ]]; then
            PKG_VERSION="${INPUT_VERSION}"
          elif printf '%s' "${TAG_REF}" | grep -qE '^refs/tags/v'; then
            PKG_VERSION="${TAG_REF#refs/tags/v}"
          else
            echo "ERROR: Cannot derive version — not a tag push and no version input provided" >&2
            exit 1
          fi

          ./packaging/scripts/validate-version.sh "${PKG_VERSION}"

          NFPM_ARCH="${MATRIX_ARCH}"

          # Map arch for RPM naming (amd64→x86_64, arm64→aarch64)
          case "${NFPM_ARCH}" in
            amd64)  RPM_ARCH="x86_64" ;;
            arm64)  RPM_ARCH="aarch64" ;;
            *)
              echo "ERROR: Unsupported architecture: ${NFPM_ARCH}" >&2
              exit 1
              ;;
          esac

          # Artifact filenames per spec 31 naming conventions
          DEB_FILENAME="nginx-module-markdown-for-agents_${PKG_VERSION}_nginx-${NGINX_VERSION}_${NFPM_ARCH}.deb"
          RPM_FILENAME="nginx-module-markdown-for-agents-${PKG_VERSION}-nginx${NGINX_VERSION}-1.${RPM_ARCH}.rpm"

          # Compute NGINX version branch bounds for ABI-safe dependency constraints.
          # Floor = major.minor.0, Ceiling = major.(minor+1).0 (exclusive upper bound).
          # Example: NGINX 1.26.3 → floor=1.26.0, ceil=1.27.0
          IFS='.' read -r MAJOR MINOR _PATCH <<< "${NGINX_VERSION}"
          NGINX_VERSION_FLOOR="${MAJOR}.${MINOR}.0"
          NGINX_VERSION_CEIL="${MAJOR}.$((MINOR + 1)).0"

          # Export to GITHUB_ENV for subsequent steps
          {
            echo "PKG_VERSION=${PKG_VERSION}"
            echo "NGINX_VERSION=${NGINX_VERSION}"
            echo "NGINX_VERSION_FLOOR=${NGINX_VERSION_FLOOR}"
            echo "NGINX_VERSION_CEIL=${NGINX_VERSION_CEIL}"
            echo "NFPM_ARCH=${NFPM_ARCH}"
            echo "RPM_ARCH=${RPM_ARCH}"
            echo "DEB_FILENAME=${DEB_FILENAME}"
            echo "RPM_FILENAME=${RPM_FILENAME}"
          } >> "$GITHUB_ENV"

          # Output for downstream reference
          {
            echo "pkg_version=${PKG_VERSION}"
            echo "deb_filename=${DEB_FILENAME}"
            echo "rpm_filename=${RPM_FILENAME}"
          } >> "$GITHUB_OUTPUT"

          echo "PKG_VERSION=${PKG_VERSION}" >&2
          echo "NGINX_VERSION=${NGINX_VERSION}" >&2
          echo "NFPM_ARCH=${NFPM_ARCH}" >&2
          echo "DEB_FILENAME=${DEB_FILENAME}" >&2
          echo "RPM_FILENAME=${RPM_FILENAME}" >&2
        shell: bash

      - name: Prepare nFPM config with version-stamped preinstall
        run: |
          # Copy preinstall.sh to a temp directory and substitute the version
          # placeholder there, keeping the tracked checkout unmodified.
          NFPM_TMP="$(mktemp -d)"
          cp packaging/nfpm/scripts/preinstall.sh "${NFPM_TMP}/preinstall.sh"
          sed -i "s/%%NGINX_VERSION%%/${NGINX_VERSION}/g" "${NFPM_TMP}/preinstall.sh"

          # Generate a temporary nfpm config that references the temp preinstall
          # while keeping all other paths relative to the workspace root.
          sed "s|./packaging/nfpm/scripts/preinstall.sh|${NFPM_TMP}/preinstall.sh|" \
            packaging/nfpm/nfpm.yaml > "${NFPM_TMP}/nfpm.yaml"

          echo "NFPM_TMP=${NFPM_TMP}" >> "$GITHUB_ENV"
          echo "Version-stamped preinstall.sh written to ${NFPM_TMP}/preinstall.sh" >&2
        shell: bash

      - name: Generate DEB package
        run: |
          mkdir -p dist
          nfpm package \
            --config "${NFPM_TMP}/nfpm.yaml" \
            --packager deb \
            --target "dist/${{ steps.pkg-env.outputs.deb_filename }}"
          echo "Generated: dist/${{ steps.pkg-env.outputs.deb_filename }}" >&2
          ls -la "dist/${{ steps.pkg-env.outputs.deb_filename }}"
        shell: bash

      - name: Generate RPM package
        run: |
          nfpm package \
            --config "${NFPM_TMP}/nfpm.yaml" \
            --packager rpm \
            --target "dist/${{ steps.pkg-env.outputs.rpm_filename }}"
          echo "Generated: dist/${{ steps.pkg-env.outputs.rpm_filename }}" >&2
          ls -la "dist/${{ steps.pkg-env.outputs.rpm_filename }}"
        shell: bash

      - name: Validate install layout
        run: |
          bash tools/release/gates/check_install_layout.sh \
            "dist/${{ steps.pkg-env.outputs.deb_filename }}" \
            "dist/${{ steps.pkg-env.outputs.rpm_filename }}"
        shell: bash

      - name: Upload DEB artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pkg-deb-${{ matrix.nginx_version }}-${{ matrix.arch }}
          path: dist/${{ steps.pkg-env.outputs.deb_filename }}
          if-no-files-found: error
          retention-days: 5

      - name: Upload RPM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pkg-rpm-${{ matrix.nginx_version }}-${{ matrix.arch }}
          path: dist/${{ steps.pkg-env.outputs.rpm_filename }}
          if-no-files-found: error
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Smoke Test Job: Container install + module load verification (matrix)
  # Installs the nginx.org package and the generated module package inside
  # target distribution containers, then verifies the module loads via nginx -t.
  # This validates ABI compatibility across all supported platforms.
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test - ${{ matrix.container }} - nginx-${{ matrix.nginx_version }} (${{ matrix.format }})
    needs: [prepare, package]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    container: ${{ matrix.container }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.smoke_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pkg-${{ matrix.format }}-${{ matrix.nginx_version }}-${{ matrix.arch }}
          path: dist/

      - name: Run smoke test
        env:
          NGINX_VERSION: ${{ matrix.nginx_version }}
        run: |
          PKG_FILE="$(find dist/ -name '*.${{ matrix.format }}' -print -quit)"
          if [[ -z "${PKG_FILE}" ]]; then
            echo "ERROR: No .${{ matrix.format }} file found in dist/" >&2
            exit 1
          fi
          chmod +x packaging/scripts/smoke-test-basic.sh
          packaging/scripts/smoke-test-basic.sh "${PKG_FILE}" "${NGINX_VERSION}"
        shell: bash

      - name: Diagnostics on failure
        if: failure()
        env:
          NGINX_VERSION: ${{ matrix.nginx_version }}
        run: |
          chmod +x packaging/scripts/smoke-test-diagnostics.sh
          packaging/scripts/smoke-test-diagnostics.sh
        shell: bash

  # ─────────────────────────────────────────────────────────────────────────────
  # Release Gate Job: tag-only release governance gate
  # Runs after package smoke tests and before publication. Pull requests and
  # branch CI deliberately do not run release gates.
  # ─────────────────────────────────────────────────────────────────────────────
  release-gate:
    name: Release Gate (tag only)
    needs: smoke-test
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install release gate dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            file \
            gzip \
            rpm \
            tar
        shell: bash

      - name: Download all DEB artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pkg-deb-*
          path: dist/
          merge-multiple: true

      - name: Download all RPM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pkg-rpm-*
          path: dist/
          merge-multiple: true

      - name: Run tag release gates
        run: |
          make release-gates-check-strict
          # Run the full 0.7.0 gate validators that are not already covered
          # by the build/package/smoke-test jobs above. The full
          # release-gates-check-070 target includes build/test/fuzz which are
          # redundant here (the build and smoke-test jobs already verified
          # those), but we must run the Python gate validators and package
          # layout checks to ensure complete 0.7.0 gate coverage.
          python3 tools/release/gates/validate_config_directives_070.py
          python3 tools/release/gates/validate_metrics_070.py
          python3 tools/release/gates/validate_reason_codes_070.py
          python3 tools/release/gates/validate_package_metadata_070.py
          python3 tools/release/gates/validate_k8s_manifests_070.py
          bash tools/release/gates/check_install_layout.sh dist/*.deb dist/*.rpm
        shell: bash

  # ─────────────────────────────────────────────────────────────────────────────
  # Integrity Checksums Job: SHA256SUMS generation (no protected environment)
  # Generates checksums for all package artifacts. Does not require signing
  # secrets or protected environment approval.
  # ─────────────────────────────────────────────────────────────────────────────
  integrity-checksums:
    name: Integrity - SHA256SUMS
    needs: smoke-test
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download all DEB artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pkg-deb-*
          path: artifacts/
          merge-multiple: true

      - name: Download all RPM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pkg-rpm-*
          path: artifacts/
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ===" >&2
          ls -la artifacts/
        shell: bash

      - name: Generate SHA256SUMS
        run: |
          ./packaging/scripts/generate-checksums.sh -d artifacts/
        shell: bash

      - name: Upload SHA256SUMS
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checksums
          path: artifacts/SHA256SUMS
          if-no-files-found: error
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Integrity Signing Job: Mandatory GPG signing for tag releases
  # Always runs for tag pushes; skipped for workflow_dispatch.
  # Requires Protected Environment "release-signing" with required reviewers.
  #
  # Security:
  #   - GPG private key NEVER appears in logs (all gpg output suppressed)
  #   - Key material is cleaned up after signing
  #   - Preflight validates all 3 required secrets before attempting signing
  # ─────────────────────────────────────────────────────────────────────────────
  integrity-signing:
    name: Integrity - GPG Sign
    needs: integrity-checksums
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    environment: release-signing

    steps:
      - name: Preflight - validate GPG secrets
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          MISSING=()
          [[ -z "${GPG_PRIVATE_KEY}" ]] && MISSING+=("GPG_PRIVATE_KEY")
          [[ -z "${GPG_PASSPHRASE}" ]] && MISSING+=("GPG_PASSPHRASE")
          [[ -z "${GPG_KEY_ID}" ]] && MISSING+=("GPG_KEY_ID")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "ERROR: Missing required GPG secrets in 'release-signing' environment:" >&2
            printf '  - %s\n' "${MISSING[@]}" >&2
            echo "" >&2
            echo "To fix: go to Settings → Environments → release-signing → Environment secrets" >&2
            echo "and configure all three secrets (GPG_PRIVATE_KEY, GPG_PASSPHRASE, GPG_KEY_ID)." >&2
            exit 1
          fi
          echo "Preflight OK: all GPG secrets present in release-signing environment." >&2
        shell: bash

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download SHA256SUMS
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: checksums
          path: artifacts/

      - name: GPG sign SHA256SUMS
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          ./packaging/scripts/gpg-sign-checksums.sh artifacts/SHA256SUMS "${GPG_KEY_ID}"
        shell: bash

      - name: Upload SHA256SUMS.asc
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checksums-signature
          path: artifacts/SHA256SUMS.asc
          if-no-files-found: error
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish Job: Upload to GitHub Release (tag) or workflow artifacts (dispatch)
  # Conditional publishing based on trigger context:
  #   - Tag push (v*): uploads all packages + checksums to the GitHub Release
  #   - workflow_dispatch: uploads everything as a single workflow artifact
  #
  # Security:
  #   - ONLY this job has contents: write permission (Req 10.4)
  #   - All other jobs use contents: read
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish
    needs: [release-gate, integrity-checksums, integrity-signing]
    # Tag releases: signing always runs, so signing must succeed for publish.
    # workflow_dispatch: signing is skipped, publish proceeds without it.
    if: >-
      always()
      && needs.integrity-checksums.result == 'success'
      && (needs.release-gate.result == 'success'
          || needs.release-gate.result == 'skipped')
      && (needs.integrity-signing.result == 'success'
          || (needs.integrity-signing.result == 'skipped'
              && github.ref_type != 'tag'))
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all DEB artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pkg-deb-*
          path: release-assets/
          merge-multiple: true

      - name: Download all RPM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pkg-rpm-*
          path: release-assets/
          merge-multiple: true

      - name: Download SHA256SUMS
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: checksums
          path: release-assets/

      - name: Download SHA256SUMS.asc
        if: github.ref_type == 'tag'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: checksums-signature
          path: release-assets/

      - name: Download SHA256SUMS.asc (best-effort for non-tag)
        if: github.ref_type != 'tag'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: checksums-signature
          path: release-assets/

      - name: List release assets
        run: |
          echo "=== Release assets ===" >&2
          ls -la release-assets/
        shell: bash

      - name: Upload to GitHub Release (tag push)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: release-assets/*

      - name: Upload as workflow artifacts (workflow_dispatch)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-packages
          path: release-assets/
          if-no-files-found: error
          retention-days: 5
