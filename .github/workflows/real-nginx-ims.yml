name: Real NGINX IMS Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "components/nginx-module/**"
      - "components/rust-converter/**"
      - "tools/ci/verify_real_nginx_ims.sh"
      - "tools/c-extract/extract_c_function.py"
      - ".github/workflows/real-nginx-ims.yml"
  push:
    branches: [main, master]
    paths:
      - "components/nginx-module/**"
      - "components/rust-converter/**"
      - "tools/ci/verify_real_nginx_ims.sh"
      - "tools/c-extract/extract_c_function.py"
      - ".github/workflows/real-nginx-ims.yml"

permissions:
  contents: read

concurrency:
  group: ims-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-real-nginx-ims:
    name: Verify Delegated IMS with Real NGINX (${{ matrix.nginx_channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - nginx_channel: stable
            port: 18088
          - nginx_channel: mainline
            port: 18089

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            pkg-config \
            python3 \
            rsync \
            zlib1g-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: |
            components/rust-converter -> target

      - name: Sanity check required commands
        run: |
          set -euo pipefail
          for cmd in bash gcc make python3 cargo rustc rustup curl rsync awk tar; do
            command -v "$cmd" >/dev/null
          done

      - name: Ensure Rust project compiles
        working-directory: components/rust-converter
        run: cargo check --all-targets

      - name: Run real NGINX If-Modified-Since validation
        run: bash ./tools/ci/verify_real_nginx_ims.sh --nginx-version "${{ matrix.nginx_channel }}" --port "${{ matrix.port }}"
