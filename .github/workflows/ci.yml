name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - "components/**"
      - "tools/**"
      - "tests/**"
      - "docs/**"
      - "perf/**"
      - "Makefile"
      - "README.md"
      - "README_zh-CN.md"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "components/**"
      - "tools/**"
      - "tests/**"
      - "docs/**"
      - "perf/**"
      - "Makefile"
      - "README.md"
      - "README_zh-CN.md"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      rust: ${{ steps.filter.outputs.rust }}
      nginx: ${{ steps.filter.outputs.nginx }}
      e2e: ${{ steps.filter.outputs.e2e }}
      perf: ${{ steps.filter.outputs.perf }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # v4.0.0
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'README.md'
              - 'README_zh-CN.md'
              - 'tools/docs/**'
            rust:
              - 'components/rust-converter/**'
              - 'Makefile'
            nginx:
              - 'components/nginx-module/**'
              - 'Makefile'
            e2e:
              - 'components/nginx-module/**'
              - 'components/rust-converter/**'
              - 'tests/corpus/**'
              - 'tools/e2e/**'
              - 'Makefile'
            perf:
              - 'components/rust-converter/**'
              - 'perf/**'
              - 'tools/perf/**'
            workflows:
              - '.github/workflows/**'

  docs-check:
    name: Docs Check
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14.3'

      - name: Validate docs
        run: |
          python3 tools/docs/check_duplicate_docs.py
          python3 tools/docs/check_docs.py

  rust-quality:
    name: Rust Quality Gate
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.e2e == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt,clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target

      - name: Check formatting
        working-directory: components/rust-converter
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        working-directory: components/rust-converter
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: make test-rust

  nginx-c-tests:
    name: NGINX C Tests (Unit + Integration-C)
    needs: changes
    if: needs.changes.outputs.nginx == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install C toolchain deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            zlib1g-dev

      - name: Run NGINX C unit tests
        run: make test-nginx-unit

      - name: Run NGINX C integration harness
        run: make -C components/nginx-module/tests integration-c

  nginx-c-clang-smoke:
    name: NGINX C Clang Smoke
    needs: changes
    if: needs.changes.outputs.nginx == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install clang toolchain deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            zlib1g-dev

      - name: Run NGINX C smoke tests with clang
        run: make test-nginx-unit-clang-smoke

  nginx-c-sanitizers:
    name: NGINX C Sanitizer Smoke
    needs: changes
    if: needs.changes.outputs.nginx == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install clang toolchain deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            zlib1g-dev

      - name: Run NGINX C smoke tests with ASan/UBSan
        run: make test-nginx-unit-sanitize-smoke

  runtime-regressions:
    name: Runtime Regressions (IMS + Chunked + Large)
    needs: [changes, rust-quality]
    if: needs.changes.outputs.e2e == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install E2E system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            pkg-config \
            python3 \
            rsync \
            zlib1g-dev \
            apache2-utils

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target

      - name: Run delegated If-Modified-Since runtime validation
        id: ims_runtime
        shell: bash
        run: |
          set -euo pipefail
          nginx_bin_file="$(mktemp)"
          buildroot_file="$(mktemp)"
          ./tools/ci/verify_real_nginx_ims.sh \
            --keep-artifacts \
            --nginx-bin-output "${nginx_bin_file}" \
            --buildroot-output "${buildroot_file}"

          buildroot="$(cat "${buildroot_file}")"
          if [[ -z "${buildroot}" ]]; then
            echo "Failed to locate retained IMS build artifacts" >&2
            exit 1
          fi

          nginx_bin="$(cat "${nginx_bin_file}")"
          if [[ ! -x "${nginx_bin}" ]]; then
            echo "Retained IMS nginx binary is missing: ${nginx_bin}" >&2
            exit 1
          fi

          echo "buildroot=${buildroot}" >> "${GITHUB_OUTPUT}"
          echo "nginx_bin=${nginx_bin}" >> "${GITHUB_OUTPUT}"

      - name: Run chunked streaming native smoke validation
        env:
          NGINX_BIN: ${{ steps.ims_runtime.outputs.nginx_bin }}
        run: ./tools/e2e/verify_chunked_streaming_native_e2e.sh --profile smoke

      - name: Run large-response native E2E verification
        env:
          NGINX_BIN: ${{ steps.ims_runtime.outputs.nginx_bin }}
        run: ./tools/e2e/verify_large_markdown_response_e2e.sh

      - name: Remove retained IMS build artifacts
        if: always()
        env:
          IMS_BUILDROOT: ${{ steps.ims_runtime.outputs.buildroot }}
        run: |
          if [[ -n "${IMS_BUILDROOT}" && -d "${IMS_BUILDROOT}" ]]; then
            rm -rf "${IMS_BUILDROOT}"
          fi

  perf-artifacts:
    name: Perf Baseline Artifact
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target

      - name: Collect performance baselines
        run: |
          mkdir -p artifacts/perf
          cd components/rust-converter
          cargo run --release --example perf_baseline | tee ../../artifacts/perf/perf_baseline_full.txt
          /usr/bin/time -v cargo run --release --example perf_baseline -- --single medium \
            > ../../artifacts/perf/perf_baseline_medium.txt \
            2> ../../artifacts/perf/perf_baseline_medium.time.txt
          /usr/bin/time -v cargo run --release --example perf_baseline -- --single medium-front-matter \
            > ../../artifacts/perf/perf_baseline_medium_front_matter.txt \
            2> ../../artifacts/perf/perf_baseline_medium_front_matter.time.txt
          /usr/bin/time -v cargo run --release --example perf_baseline -- --single large \
            > ../../artifacts/perf/perf_baseline_large.txt \
            2> ../../artifacts/perf/perf_baseline_large.time.txt

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: perf-baseline-artifacts
          path: artifacts/perf

  perf-smoke:
    name: Perf Smoke Gate
    needs: changes
    if: needs.changes.outputs.perf == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14.3'

      - name: Install Python test dependencies
        run: pip install hypothesis pytest

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target

      - name: Build release binary
        working-directory: components/rust-converter
        run: cargo build --release --example perf_baseline

      - name: Detect platform
        id: platform
        run: |
          echo "name=$(python3 tools/perf/report_utils.py detect-platform)" >> "$GITHUB_OUTPUT"

      - name: Run perf baseline (small + medium)
        env:
          PERF_GATE_SKIP: "1"
        run: |
          mkdir -p perf/reports
          tools/perf/run_perf_baseline.sh --tier small --json-output perf/reports/perf-measurement-small.json
          tools/perf/run_perf_baseline.sh --tier medium --json-output perf/reports/perf-measurement-medium.json

      - name: Merge measurement reports
        run: |
          python3 tools/perf/report_utils.py merge-measurements \
            --glob-pattern 'perf/reports/perf-measurement-*.json' \
            --output perf/reports/perf-measurement-${{ steps.platform.outputs.name }}.json

      - name: Run perf gate Python tests
        run: python3 -m pytest tools/perf/tests/ -v

      - name: Run local runner output path tests
        run: bash tools/perf/tests/test_local_runner_output_paths.sh

      - name: Run threshold engine
        run: |
          python3 tools/perf/threshold_engine.py \
            --baseline perf/baselines/${{ steps.platform.outputs.name }}.json \
            --current perf/reports/perf-measurement-${{ steps.platform.outputs.name }}.json \
            --thresholds perf/thresholds.json \
            --metrics-schema perf/metrics-schema.json \
            --output-json perf/reports/perf-verdict-${{ steps.platform.outputs.name }}.json \
            --platform ${{ steps.platform.outputs.name }}

      - name: Upload measurement report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: perf-measurement-${{ steps.platform.outputs.name }}.json
          path: perf/reports/perf-measurement-${{ steps.platform.outputs.name }}.json

      - name: Upload verdict report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: perf-verdict-${{ steps.platform.outputs.name }}.json
          path: perf/reports/perf-verdict-${{ steps.platform.outputs.name }}.json
