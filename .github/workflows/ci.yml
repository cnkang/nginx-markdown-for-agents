name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - "AGENTS.md"
      - "components/**"
      - "tools/**"
      - "tests/**"
      - "docs/**"
      - "perf/**"
      - "packaging/**"
      - "examples/nginx-configs/**"
      - "examples/kubernetes/**"
      - "charts/**"
      - "Makefile"
      - "README.md"
      - "README_zh-CN.md"
      - ".github/workflows/**"
      - "tools/ci/coverage_gate.py"
      - "rust-toolchain.toml"
  push:
    branches: [main, master]
    paths:
      - "AGENTS.md"
      - "components/**"
      - "tools/**"
      - "tests/**"
      - "docs/**"
      - "perf/**"
      - "packaging/**"
      - "examples/nginx-configs/**"
      - "examples/kubernetes/**"
      - "charts/**"
      - "Makefile"
      - "README.md"
      - "README_zh-CN.md"
      - ".github/workflows/**"
      - "tools/ci/coverage_gate.py"
      - "rust-toolchain.toml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

# =============================================================================
# CI Job Classification (Spec 43 — Requirement 6)
# =============================================================================
#
# BLOCKING (release-gate equivalent — must pass for merge/release):
#   - docs-check             — Documentation consistency (make docs-check)
#                              Includes: validate_workflow_matrix_consumers.py (Req 5)
#   - rust-quality           — Rust formatting, clippy, unit tests (make test-rust)
#                              Includes: streaming tests via --all-features (Req 1)
#   - nginx-c-tests          — C unit + integration tests (make test-nginx-unit)
#   - coverage-gate          — C + Rust coverage (make coverage-c, coverage-rust)
#   - runtime-regressions    — IMS + chunked streaming native E2E + large response
#                              Includes: verify-chunked-native-e2e-smoke (Req 1.2)
#   - header-sync            — FFI header generation drift check
#   - nginx-c-clang-smoke    — Clang cross-compiler smoke
#   - nginx-c-sanitizers     — ASan/UBSan sanitizer smoke
#   - matrix-release-tests   — Release-matrix Python test suite (Req 5)
#
# EXPERIMENTAL (non-blocking — informational, continue-on-error or nightly):
#   - perf-artifacts         — Performance baseline collection (continue-on-error: true)
#   - perf-smoke             — Performance threshold gate (informational)
#   - corpus-benchmark       — Corpus quality benchmark (informational)
#
# Note: Nightly fuzz (nightly-fuzz.yml) and Docker integration
# (official-nginx-docker.yml) run on separate schedules and are non-blocking.
# =============================================================================

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      rust: ${{ steps.filter.outputs.rust }}
      nginx: ${{ steps.filter.outputs.nginx }}
      e2e: ${{ steps.filter.outputs.e2e }}
      perf: ${{ steps.filter.outputs.perf }}
      matrix_release: ${{ steps.filter.outputs.matrix_release }}
      corpus_tools: ${{ steps.filter.outputs.corpus_tools }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            docs:
              - 'AGENTS.md'
              - 'docs/**'
              - 'README.md'
              - 'README_zh-CN.md'
              - 'tools/docs/**'
              - 'tools/harness/**'
              - 'tools/release-matrix.json'
              - 'examples/nginx-configs/**'
              - 'examples/kubernetes/**'
              - 'charts/**'
              - 'packaging/**'
            rust:
              - 'components/rust-converter/**'
              - 'Makefile'
              - 'rust-toolchain.toml'
            nginx:
              - 'components/nginx-module/**'
              - 'Makefile'
            e2e:
              - 'components/nginx-module/**'
              - 'components/rust-converter/**'
              - 'tests/corpus/**'
              - 'tools/e2e/**'
              - 'tools/e2e-harness/**'
              - 'Makefile'
            perf:
              - 'components/rust-converter/**'
              - 'perf/**'
              - 'tools/perf/**'
            matrix_release:
              - 'tools/release/matrix/**'
              - 'tools/release-matrix.json'
              - 'tools/release/gates/validate_*_070.py'
              - 'tools/release/gates/validate_*_080.py'
              - 'tools/release/gates/validate_*_090.py'
              - 'tools/perf/evidence_gate_091.py'
              - 'tools/perf/doctor_advice.py'
              - 'tools/perf/run_module_benchmark.sh'
            corpus_tools:
              - 'tools/corpus/**'
            workflows:
              - '.github/workflows/**'

  docs-check:
    name: Docs Check
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.3'

      - name: Validate docs
        run: make docs-check

  header-sync:
    name: FFI Header Generation Smoke
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target
          cache-bin: false

      - name: Install cbindgen
        run: |
          if command -v cbindgen >/dev/null 2>&1 && [ "$(cbindgen --version)" = "cbindgen 0.29.2" ]; then
            echo "cbindgen 0.29.2 already installed"
          else
            cargo install cbindgen --version 0.29.2 --locked
          fi

      - name: Generate header and verify no drift
        run: |
          make rust-lib
          make copy-headers
          make check-headers
          git diff --exit-code -- \
            components/rust-converter/include/markdown_converter.h \
            components/nginx-module/src/markdown_converter.h

  rust-quality:
    name: Rust Quality Gate
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.e2e == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt,clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target
          cache-bin: false

      - name: Check formatting
        working-directory: components/rust-converter
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        working-directory: components/rust-converter
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check corpus tool formatting
        run: cargo fmt --manifest-path tools/corpus/test-corpus-conversion/Cargo.toml --all -- --check

      - name: Clippy corpus tool
        run: cargo clippy --manifest-path tools/corpus/test-corpus-conversion/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust unit tests
        # Streaming tests are included: make test-rust uses --all-features,
        # which enables the 'streaming' feature gate (Spec 43, Req 1).
        run: make test-rust

      - name: Run Rust doctests
        working-directory: components/rust-converter
        run: cargo test --doc --all-features

  nginx-c-tests:
    name: NGINX C Tests (Unit + Integration-C)
    needs: changes
    if: needs.changes.outputs.nginx == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install C toolchain deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            zlib1g-dev

      - name: Run NGINX C unit tests
        run: make test-nginx-unit

      - name: Run NGINX C integration harness
        run: make -C components/nginx-module/tests integration-c

  nginx-c-clang-smoke:
    name: NGINX C Clang Smoke
    needs: changes
    if: needs.changes.outputs.nginx == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install clang toolchain deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            zlib1g-dev

      - name: Run NGINX C smoke tests with clang
        run: make test-nginx-unit-clang-smoke

  nginx-c-sanitizers:
    name: NGINX C Sanitizer Smoke
    needs: changes
    if: needs.changes.outputs.nginx == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install clang toolchain deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            zlib1g-dev

      - name: Run NGINX C smoke tests with ASan/UBSan
        run: make test-nginx-unit-sanitize-smoke

  runtime-regressions:
    name: Runtime Regressions (IMS + Chunked + Large)
    needs: [changes, rust-quality]
    if: needs.changes.outputs.e2e == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install E2E system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            pkg-config \
            python3 \
            rsync \
            zlib1g-dev \
            apache2-utils

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target
          cache-bin: false

      - name: Run delegated If-Modified-Since runtime validation
        id: ims_runtime
        shell: bash
        run: |
          set -euo pipefail
          nginx_bin_file="$(mktemp)"
          buildroot_file="$(mktemp)"
          ./tools/ci/verify_real_nginx_ims.sh \
            --keep-artifacts \
            --nginx-bin-output "${nginx_bin_file}" \
            --buildroot-output "${buildroot_file}"

          buildroot="$(cat "${buildroot_file}")"
          if [[ -z "${buildroot}" ]]; then
            echo "Failed to locate retained IMS build artifacts" >&2
            exit 1
          fi

          nginx_bin="$(cat "${nginx_bin_file}")"
          if [[ ! -x "${nginx_bin}" ]]; then
            echo "Retained IMS nginx binary is missing: ${nginx_bin}" >&2
            exit 1
          fi

          echo "buildroot=${buildroot}" >> "${GITHUB_OUTPUT}"
          echo "nginx_bin=${nginx_bin}" >> "${GITHUB_OUTPUT}"

      - name: Run chunked streaming native smoke validation
        # Covers Spec 43 Req 1.2: native NGINX chunked/no-Content-Length E2E
        # proving output is emitted before full upstream body is buffered.
        # CI-equivalent of: make verify-chunked-native-e2e-smoke
        env:
          NGINX_BIN: ${{ steps.ims_runtime.outputs.nginx_bin }}
        run: ./tools/e2e/verify_chunked_streaming_native_e2e.sh --profile smoke

      - name: Run large-response native E2E verification
        env:
          NGINX_BIN: ${{ steps.ims_runtime.outputs.nginx_bin }}
        run: ./tools/e2e/verify_large_markdown_response_e2e.sh

      - name: Remove retained IMS build artifacts
        if: always()
        env:
          IMS_BUILDROOT: ${{ steps.ims_runtime.outputs.buildroot }}
        run: |
          if [[ -n "${IMS_BUILDROOT}" && -d "${IMS_BUILDROOT}" ]]; then
            rm -rf "${IMS_BUILDROOT}"
          fi

  perf-artifacts:
    name: Perf Baseline Artifact
    needs: changes
    if: needs.changes.outputs.perf == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.91.1

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target
          cache-bin: false

      - name: Collect performance baselines
        run: |
          mkdir -p artifacts/perf
          cd components/rust-converter
          cargo run --release --example perf_baseline | tee ../../artifacts/perf/perf_baseline_full.txt
          /usr/bin/time -v cargo run --release --example perf_baseline -- --single medium \
            > ../../artifacts/perf/perf_baseline_medium.txt \
            2> ../../artifacts/perf/perf_baseline_medium.time.txt
          /usr/bin/time -v cargo run --release --example perf_baseline -- --single medium-front-matter \
            > ../../artifacts/perf/perf_baseline_medium_front_matter.txt \
            2> ../../artifacts/perf/perf_baseline_medium_front_matter.time.txt
          /usr/bin/time -v cargo run --release --example perf_baseline -- --single large \
            > ../../artifacts/perf/perf_baseline_large.txt \
            2> ../../artifacts/perf/perf_baseline_large.time.txt

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-baseline-artifacts
          path: artifacts/perf

  perf-smoke:
    name: Perf Smoke Gate
    needs: changes
    if: needs.changes.outputs.perf == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      RUSTUP_AUTO_INSTALL: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.91.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.3'

      - name: Install Python test dependencies
        run: pip install -r requirements-dev.txt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target
          cache-bin: false

      - name: Build release binary
        working-directory: components/rust-converter
        run: cargo build --release --example perf_baseline

      - name: Detect platform
        id: platform
        run: |
          echo "name=$(python3 tools/perf/report_utils.py detect-platform)" >> "$GITHUB_OUTPUT"

      - name: Run perf baseline (small + medium)
        env:
          PERF_GATE_SKIP: "1"
        run: |
          mkdir -p perf/reports
          tools/perf/run_perf_baseline.sh --tier small --json-output perf/reports/perf-measurement-small.json
          tools/perf/run_perf_baseline.sh --tier medium --json-output perf/reports/perf-measurement-medium.json

      - name: Merge measurement reports
        run: |
          python3 tools/perf/report_utils.py merge-measurements \
            --glob-pattern 'perf/reports/perf-measurement-*.json' \
            --output perf/reports/perf-measurement-${{ steps.platform.outputs.name }}.json

      - name: Run perf gate Python tests
        run: python3 -m pytest tools/perf/tests/ -v

      - name: Run local runner output path tests
        run: tools/perf/tests/test_local_runner_output_paths.sh

      - name: Run threshold engine
        run: |
          python3 tools/perf/threshold_engine.py \
            --baseline perf/baselines/${{ steps.platform.outputs.name }}.json \
            --current perf/reports/perf-measurement-${{ steps.platform.outputs.name }}.json \
            --thresholds perf/thresholds.json \
            --metrics-schema perf/metrics-schema.json \
            --platform ${{ steps.platform.outputs.name }} \
            > perf/reports/perf-verdict-${{ steps.platform.outputs.name }}.json

      - name: Upload measurement report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-measurement-${{ steps.platform.outputs.name }}.json
          path: perf/reports/perf-measurement-${{ steps.platform.outputs.name }}.json

      - name: Upload verdict report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-verdict-${{ steps.platform.outputs.name }}.json
          path: perf/reports/perf-verdict-${{ steps.platform.outputs.name }}.json

  matrix-release-tests:
    name: Matrix Release Tests
    # Covers Spec 43 Req 5: matrix schema valid, supported entries have CI,
    # no artifact exceeds scope. Also runs as part of docs-check via make docs-check.
    # validate_workflow_matrix_consumers.py consumes only repo-owned sources.
    needs: changes
    if: needs.changes.outputs.matrix_release == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.3'

      - name: Install Python test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run release-matrix Python tests
        run: PYTHONPATH=. python3 -m pytest -q tools/release/matrix/tests/

  coverage-gate:
    name: Coverage Gate (80%)
    needs: changes
    if: needs.changes.outputs.nginx == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install coverage deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            lcov \
            pkg-config \
            python3 \
            zlib1g-dev \
            apache2-utils

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target
          cache-bin: false

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2
        with:
          tool: cargo-llvm-cov

      - name: Run coverage gate
        run: make coverage-gate

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: coverage/

  corpus-benchmark:
    name: Corpus Benchmark Gate
    needs: changes
    if: needs.changes.outputs.perf == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.e2e == 'true' || needs.changes.outputs.corpus_tools == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.3'

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target
            tools/corpus/test-corpus-conversion -> target
          cache-bin: false

      - name: Run corpus benchmark
        run: make test-benchmark

      - name: Detect platform
        id: platform
        run: |
          echo "name=$(python3 tools/perf/report_utils.py detect-platform)" >> "$GITHUB_OUTPUT"

      - name: Run corpus benchmark comparison
        run: |
          BASELINE="perf/baselines/corpus-baseline.json"
          if [ ! -f "$BASELINE" ]; then
            echo "ERROR: corpus baseline not found at $BASELINE"
            echo "Run 'make test-benchmark' locally and commit the baseline:"
            echo "  cp perf/reports/corpus-report.json perf/baselines/corpus-baseline.json"
            exit 1
          fi
          python3 tools/perf/compare_reports.py \
            --baseline "$BASELINE" \
            --current perf/reports/corpus-report.json \
            --thresholds perf/quality-thresholds.json \
            --output perf/reports/corpus-verdict-${{ steps.platform.outputs.name }}.json

      - name: Generate PR benchmark summary
        run: make test-benchmark-summary

      - name: Upload corpus report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: corpus-report-${{ steps.platform.outputs.name }}.json
          path: perf/reports/corpus-report.json

      - name: Upload corpus verdict
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: corpus-verdict-${{ steps.platform.outputs.name }}.json
          path: perf/reports/corpus-verdict-${{ steps.platform.outputs.name }}.json

      - name: Upload before/after examples
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: corpus-examples
          path: perf/reports/examples/

  # ─── 0.9.0 Release Gate (Experimental / Non-blocking) ────────────────────────
  # This job validates 0.9.0 release readiness. It is experimental and does not
  # block PR merge. It becomes blocking at the actual 0.9.0 tag release.
  release-gate-090:
    name: Release Gate 0.9.0 (Experimental)
    needs: [changes, rust-quality, nginx-c-tests]
    if: >-
      always() &&
      (needs.changes.outputs.rust == 'true' || needs.changes.outputs.nginx == 'true' ||
       needs.changes.outputs.docs == 'true' || needs.changes.outputs.workflows == 'true' ||
       needs.changes.outputs.perf == 'true' || needs.changes.outputs.matrix_release == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.3'

      - name: Run 0.9.0 gate validator
        run: python3 tools/release/gates/validate_release_gates_090.py
