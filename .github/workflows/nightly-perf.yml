name: Nightly Performance

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      bootstrap_baseline:
        description: "Generate and upload a baseline artifact instead of running threshold comparison"
        required: false
        default: false
        type: boolean
      bootstrap_module_baseline:
        description: "Generate the canonical 0.9.1 module baseline on native x86_64"
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  nightly-perf:
    name: Nightly Full Performance
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.bootstrap_module_baseline) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.97.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.3'

      - name: Install Python test dependencies
        run: pip install -r requirements-dev.txt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target
          cache-bin: false

      - name: Build release binary
        working-directory: components/rust-converter
        run: cargo build --release --example perf_baseline

      - name: Detect platform
        id: platform
        run: |
          echo "name=$(python3 tools/perf/report_utils.py detect-platform)" >> "$GITHUB_OUTPUT"

      - name: Run all tiers (3 repeats each)
        env:
          PERF_GATE_SKIP: "1"
        run: |
          mkdir -p perf/reports/runs
          TIERS="small medium medium-front-matter large-1m"
          for tier in $TIERS; do
            for run in 1 2 3; do
              tools/perf/run_perf_baseline.sh \
                --tier "$tier" \
                --json-output "perf/reports/runs/${tier}-run${run}.json"
            done
          done

      - name: Compute median and merge reports
        env:
          PLATFORM: ${{ steps.platform.outputs.name }}
        run: |
          python3 tools/perf/report_utils.py aggregate-runs \
            --input-dir perf/reports/runs \
            --output "perf/reports/perf-measurement-${PLATFORM}.json" \
            --platform "${PLATFORM}" \
            --tiers small medium medium-front-matter large-1m

      - name: Run perf gate Python tests
        run: python3 -m pytest tools/perf/tests/ -v

      - name: Run local runner output path tests
        run: tools/perf/tests/test_local_runner_output_paths.sh

      - name: Generate baseline artifact
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap_baseline == 'true' }}
        env:
          PLATFORM: ${{ steps.platform.outputs.name }}
        run: |
          python3 tools/perf/report_utils.py extract-baseline \
            --measurement "perf/reports/perf-measurement-${PLATFORM}.json" \
            --output "perf/baselines/${PLATFORM}.json" \
            --platform "${PLATFORM}"

      - name: Run threshold engine
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap_baseline == 'true') }}
        run: |
          python3 tools/perf/threshold_engine.py \
            --baseline perf/baselines/${{ steps.platform.outputs.name }}.json \
            --current perf/reports/perf-measurement-${{ steps.platform.outputs.name }}.json \
            --thresholds perf/thresholds.json \
            --metrics-schema perf/metrics-schema.json \
            --platform ${{ steps.platform.outputs.name }} \
            > perf/reports/perf-verdict-${{ steps.platform.outputs.name }}.json

      - name: Upload measurement report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-measurement-${{ steps.platform.outputs.name }}.json
          path: perf/reports/perf-measurement-${{ steps.platform.outputs.name }}.json

      - name: Upload verdict report
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap_baseline == 'true') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-verdict-${{ steps.platform.outputs.name }}.json
          path: perf/reports/perf-verdict-${{ steps.platform.outputs.name }}.json

      - name: Upload baseline artifact
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap_baseline == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-baseline-${{ steps.platform.outputs.name }}.json
          path: perf/baselines/${{ steps.platform.outputs.name }}.json

      - name: Run corpus benchmark
        run: make test-benchmark

      - name: Run corpus benchmark comparison
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap_baseline == 'true') }}
        run: |
          BASELINE="perf/baselines/corpus-baseline.json"
          if [ ! -f "$BASELINE" ]; then
            echo "ERROR: corpus baseline not found at $BASELINE"
            echo "Run 'make test-benchmark' locally and commit the baseline:"
            echo "  cp perf/reports/corpus-report.json perf/baselines/corpus-baseline.json"
            exit 1
          fi
          python3 tools/perf/compare_reports.py \
            --baseline "$BASELINE" \
            --current perf/reports/corpus-report.json \
            --thresholds perf/quality-thresholds.json \
            --output perf/reports/corpus-verdict-${{ steps.platform.outputs.name }}.json

      - name: Generate PR benchmark summary
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap_baseline == 'true') }}
        run: make test-benchmark-summary

      - name: Upload corpus report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: corpus-report-${{ steps.platform.outputs.name }}.json
          path: perf/reports/corpus-report.json

      - name: Upload corpus verdict
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap_baseline == 'true') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: corpus-verdict-${{ steps.platform.outputs.name }}.json
          path: perf/reports/corpus-verdict-${{ steps.platform.outputs.name }}.json

      - name: Upload before/after examples
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: corpus-examples
          path: perf/reports/examples/

  module-baseline-091:
    name: Canonical Module Baseline 0.9.1
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap_module_baseline }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      RUST_TARGET: x86_64-unknown-linux-gnu
      RUST_FEATURES: streaming,incremental
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Require native x86_64 runner
        run: |
          [[ "$(uname -m)" == "x86_64" ]] || {
            echo "ERROR: canonical module baseline requires native x86_64" >&2
            exit 1
          }
        shell: bash

      - name: Determine canonical benchmark NGINX version
        id: bench-nginx
        run: |
          python3 - <<'PY'
          import json
          import os

          with open("tools/release-matrix.json", encoding="utf-8") as handle:
              data = json.load(handle)

          owner = ".github/workflows/release-packages.yml"
          versions = sorted(
              {
                  entry["nginx_version"]
                  for entry in data.get("entries", [])
                  if entry.get("owner_workflow") == owner
                  and entry.get("support_tier") == "supported"
                  and entry.get("libc") == "glibc"
                  and entry.get("release_blocking") is True
              },
              key=lambda value: tuple(int(part) for part in value.split(".")),
          )
          if not versions:
              raise SystemExit("no canonical release-blocking NGINX version")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={versions[0]}\n")
          PY
        shell: bash

      - name: Install native benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            apache2-utils \
            binutils \
            build-essential \
            ca-certificates \
            curl \
            libpcre2-dev \
            libssl-dev \
            zlib1g-dev
        shell: bash

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.97.0
          targets: x86_64-unknown-linux-gnu

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.3'

      - name: Install release-gate tooling
        run: |
          python3 -m pip install -r requirements-dev.txt lizard complexipy
          if ! command -v cbindgen >/dev/null 2>&1 \
              || [[ "$(cbindgen --version)" != "cbindgen 0.29.2" ]]; then
            cargo install cbindgen --version 0.29.2 --locked
          fi
        shell: bash

      - name: Download verified NGINX source
        env:
          NGINX_VERSION: ${{ steps.bench-nginx.outputs.version }}
        run: |
          NGINX_TARBALL="nginx-${NGINX_VERSION}.tar.gz"
          curl -fsSL -o "${NGINX_TARBALL}" \
            "https://nginx.org/download/${NGINX_TARBALL}"
          packaging/scripts/verify-checksum.sh \
            -f "${NGINX_TARBALL}" \
            -i "nginx-${NGINX_VERSION}"
          tar xzf "${NGINX_TARBALL}"
          echo "NGINX_SRC=${GITHUB_WORKSPACE}/nginx-${NGINX_VERSION}" \
            >> "${GITHUB_ENV}"
        shell: bash

      - name: Build Rust converter
        working-directory: components/rust-converter
        run: |
          cargo build --release --locked --target "${RUST_TARGET}" \
            --features "${RUST_FEATURES}" \
            --config profile.release.lto=false
        shell: bash

      - name: Build module-enabled NGINX
        env:
          NGX_MARKDOWN_RUST_FEATURES: ${{ env.RUST_FEATURES }}
        run: |
          cd "${NGINX_SRC}"
          ./configure \
            --with-compat \
            --add-dynamic-module="${GITHUB_WORKSPACE}/components/nginx-module"
          make -j"$(nproc)" build
          test -x "${NGINX_SRC}/objs/nginx"
          test -f "${NGINX_SRC}/objs/ngx_http_markdown_filter_module.so"
        shell: bash

      - name: Generate canonical seven-scenario module baseline
        run: |
          NGINX_BIN="${NGINX_SRC}/objs/nginx" \
          MODULE_SO="${NGINX_SRC}/objs/ngx_http_markdown_filter_module.so" \
            tools/perf/run_module_benchmark.sh \
            --output perf/baselines/module-baseline-091.json
        shell: bash

      - name: Validate canonical module baseline
        run: |
          python3 - <<'PY'
          import json
          from tools.perf.evidence_gate import _validate_benchmark_evidence

          path = "perf/baselines/module-baseline-091.json"
          with open(path, encoding="utf-8") as handle:
              baseline = json.load(handle)
          violations = _validate_benchmark_evidence(baseline, role="baseline")
          if violations:
              for check, reason in violations:
                  print(f"{check}: {reason}")
              raise SystemExit("canonical module baseline validation failed")
          PY
        shell: bash

      - name: Upload canonical module baseline
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: module-baseline-091-${{ github.sha }}
          path: perf/baselines/module-baseline-091.json
          if-no-files-found: error
          retention-days: 14

      - name: Run canonical performance evidence check
        run: |
          NGINX_BIN="${NGINX_SRC}/objs/nginx" \
          MODULE_SO="${NGINX_SRC}/objs/ngx_http_markdown_filter_module.so" \
            make perf-evidence-check

      - name: Run canonical 0.9.1 release gates
        run: |
          NGINX_BIN="${NGINX_SRC}/objs/nginx" \
          MODULE_SO="${NGINX_SRC}/objs/ngx_http_markdown_filter_module.so" \
            make release-gates-check-091
