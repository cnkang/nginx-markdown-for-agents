name: Security Scanning (CodeQL + Rust Audit)

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - "components/**"
      - "tools/ci/build_nginx_for_codeql.sh"
      - "tools/ci/check_c_licenses.py"
      - "tools/ci/check_rust_licenses.py"
      - "tools/ci/check_third_party_notices.py"
      - "THIRD-PARTY-NOTICES"
      - "Makefile"
      - ".github/workflows/codeql.yml"
  push:
    branches: [main, master]
    paths:
      - "components/**"
      - "tools/ci/build_nginx_for_codeql.sh"
      - "tools/ci/check_c_licenses.py"
      - "tools/ci/check_rust_licenses.py"
      - "tools/ci/check_third_party_notices.py"
      - "THIRD-PARTY-NOTICES"
      - "Makefile"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "37 2 * * 0"

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  codeql-c-cpp:
    name: CodeQL (C/C++ Production Sources)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL for C/C++
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended,security-and-quality

      - name: Install C build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            python3 \
            zlib1g-dev

      - name: Set up Rust toolchain for module linkage
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target

      - name: C copyleft license policy check
        run: python3 tools/ci/check_c_licenses.py

      - name: Build production C sources for CodeQL
        run: ./tools/ci/build_nginx_for_codeql.sh

      - name: Run CodeQL analysis for C/C++
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          category: "/language:c-cpp"

  codeql-rust:
    name: CodeQL (Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL for Rust
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: rust
          build-mode: none
          queries: security-extended,security-and-quality

      - name: Run CodeQL analysis for Rust
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          category: "/language:rust"

  rust-security-audit:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-audit
        working-directory: components/rust-converter
        run: cargo install cargo-audit --locked

      - name: Rust dependency vulnerability audit
        working-directory: components/rust-converter
        run: cargo audit --deny warnings

      - name: Rust copyleft license policy check
        run: python3 tools/ci/check_rust_licenses.py --locked

      - name: THIRD-PARTY-NOTICES coverage check
        run: python3 tools/ci/check_third_party_notices.py
