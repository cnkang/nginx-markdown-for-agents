name: Coverity Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "dev/*"
      - "codex/*"
    paths:
      - "components/nginx-module/**"
      - "components/rust-converter/include/**"
      - "tools/ci/build_nginx_for_codeql.sh"
      - "tools/lib/nginx_markdown_native_build.sh"
      - "Makefile"
      - ".github/workflows/coverity.yml"

concurrency:
  group: coverity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  coverity:
    name: Coverity Scan (NGINX C)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      COVERITY_SCAN_PROJECT: ${{ secrets.COVERITY_SCAN_PROJECT }}
      COVERITY_SCAN_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
      COVERITY_SCAN_EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate Coverity secrets
        shell: bash
        run: |
          set -euo pipefail

          test -n "${COVERITY_SCAN_PROJECT}" || {
            echo "Missing secret: COVERITY_SCAN_PROJECT"
            exit 1
          }

          test -n "${COVERITY_SCAN_TOKEN}" || {
            echo "Missing secret: COVERITY_SCAN_TOKEN"
            exit 1
          }

          test -n "${COVERITY_SCAN_EMAIL}" || {
            echo "Missing secret: COVERITY_SCAN_EMAIL"
            exit 1
          }

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            python3 \
            zlib1g-dev

      - name: Download Coverity build tool
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --silent --show-error \
            --form token="${COVERITY_SCAN_TOKEN}" \
            --form project="${COVERITY_SCAN_PROJECT}" \
            --output coverity-tool.tgz \
            https://scan.coverity.com/download/cxx/linux64

          sudo mkdir -p /opt/coverity
          sudo tar -xzf coverity-tool.tgz --strip-components=1 -C /opt/coverity

      - name: Capture NGINX C build with Coverity
        shell: bash
        run: |
          set -euo pipefail
          export PATH="/opt/coverity/bin:${PATH}"

          # Reuse the production-module build path already used by CodeQL.
          cov-build --dir cov-int bash tools/ci/build_nginx_for_codeql.sh

      - name: Archive Coverity capture
        shell: bash
        run: |
          set -euo pipefail
          tar -czf cov-int.tgz cov-int

      - name: Submit build to Coverity Scan
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_ENCODED="$(python3 - <<'PY'
          import os
          import urllib.parse

          print(urllib.parse.quote(os.environ["COVERITY_SCAN_PROJECT"], safe=""))
          PY
          )"

          curl --fail --silent --show-error \
            --form token="${COVERITY_SCAN_TOKEN}" \
            --form email="${COVERITY_SCAN_EMAIL}" \
            --form file=@cov-int.tgz \
            --form version="${GITHUB_SHA}" \
            --form description="GitHub Actions build for ${GITHUB_REPOSITORY}@${GITHUB_REF_NAME}" \
            "https://scan.coverity.com/builds?project=${PROJECT_ENCODED}"
