name: SonarCloud

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - "AGENTS.md"
      - "components/**"
      - "tools/**"
      - "tests/**"
      - "Makefile"
      - ".sonarcloud.properties"
      - ".github/workflows/sonarcloud.yml"
  push:
    branches: [main, master]
    paths:
      - "AGENTS.md"
      - "components/**"
      - "tools/**"
      - "tests/**"
      - "Makefile"
      - ".sonarcloud.properties"
      - ".github/workflows/sonarcloud.yml"

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check Sonar token
        id: token
        shell: bash
        run: |
          if [[ -n "${SONAR_TOKEN:-}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN is not configured. Skipping SonarCloud scan." >&2
          fi

      - name: Set up Rust toolchain
        if: steps.token.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        if: steps.token.outputs.enabled == 'true'
        uses: taiki-e/install-action@735e5933943122c5ac182670a935f54a949265c1 # v2
        with:
          tool: cargo-llvm-cov

      - name: Install native build dependencies
        if: steps.token.outputs.enabled == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            lcov \
            python3 \
            zlib1g-dev

      - name: Generate compile_commands.json for CFamily analysis
        if: steps.token.outputs.enabled == 'true'
        run: make sonar-compile-db

      - name: Verify compile_commands.json exists
        if: steps.token.outputs.enabled == 'true'
        shell: bash
        run: |
          if [[ ! -s compile_commands.json ]]; then
            echo "compile_commands.json was not generated or is empty" >&2
            exit 1
          fi

      # ── Coverage collection ───────────────────────────────────────
      # C coverage: build NGINX from source with --coverage, run a
      # smoke e2e scenario, and collect gcov data for all 20+ module
      # source files.
      - name: Generate C module e2e coverage
        if: steps.token.outputs.enabled == 'true'
        run: make coverage-c

      - name: Cache Rust build artifacts
        if: steps.token.outputs.enabled == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target

      - name: Generate Rust test coverage
        if: steps.token.outputs.enabled == 'true'
        run: make coverage-rust

      - name: Convert lcov reports to SonarQube XML
        if: steps.token.outputs.enabled == 'true'
        run: make coverage-sonar-xml

      - name: Verify coverage reports exist
        if: steps.token.outputs.enabled == 'true'
        shell: bash
        run: |
          if [[ ! -s coverage/sonar-coverage.xml ]]; then
            echo "ERROR: coverage/sonar-coverage.xml missing or empty" >&2
            exit 1
          fi
          echo "OK: coverage/sonar-coverage.xml ($(wc -l < coverage/sonar-coverage.xml) lines)"

      - name: SonarCloud Scan
        if: steps.token.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        with:
          args: >
            -Dproject.settings=.sonarcloud.properties
            -Dsonar.organization=cnkang
            -Dsonar.projectKey=cnkang_nginx-markdown-for-agents
