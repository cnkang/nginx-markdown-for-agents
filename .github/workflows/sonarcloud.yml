name: SonarCloud

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - "AGENTS.md"
      - "components/**"
      - "tools/**"
      - "tests/**"
      - "Makefile"
      - ".sonarcloud.properties"
      - ".gitattributes"
      - "tools/sonar/**"
      - "tests/corpus/**"
      - ".github/workflows/sonarcloud.yml"
  push:
    branches: [main, master]
    paths:
      - "AGENTS.md"
      - "components/**"
      - "tools/**"
      - "tests/**"
      - "Makefile"
      - ".sonarcloud.properties"
      - ".gitattributes"
      - "tools/sonar/**"
      - "tests/corpus/**"
      - ".github/workflows/sonarcloud.yml"

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - name: Check Sonar token
        id: token
        shell: bash
        run: |
          if [[ -n "${SONAR_TOKEN:-}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN is not configured. Skipping SonarCloud scan." >&2
          fi

      - name: Set up Python for source audits
        if: steps.token.outputs.enabled == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14.3'

      - name: Install source audit test dependencies
        if: steps.token.outputs.enabled == 'true'
        run: python3 -m pip install --upgrade pip && python3 -m pip install pytest==8.3.5

      - name: Validate tracked source encodings
        if: steps.token.outputs.enabled == 'true'
        run: make sonar-encoding-check

      # GitHub-hosted images can contain a partial copy of this pinned
      # toolchain.  Remove only that exact copy before installing llvm-tools.
      - name: Remove incomplete pinned Rust toolchain
        if: steps.token.outputs.enabled == 'true'
        working-directory: ${{ runner.temp }}
        shell: bash
        run: |
          if rustup toolchain list | grep -q '^1\.97\.0-'; then
            rustup toolchain uninstall 1.97.0
          fi

      - name: Set up Rust toolchain
        if: steps.token.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.97.0
          components: clippy,llvm-tools-preview

      - name: Install cargo-llvm-cov
        if: steps.token.outputs.enabled == 'true'
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-llvm-cov

      - name: Install native build dependencies
        if: steps.token.outputs.enabled == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            libbrotli-dev \
            lcov \
            python3 \
            zlib1g-dev

      - name: Generate compile_commands.json for CFamily analysis
        if: steps.token.outputs.enabled == 'true'
        run: make sonar-compile-db

      - name: Verify compile_commands.json exists
        if: steps.token.outputs.enabled == 'true'
        shell: bash
        run: |
          if [[ ! -s compile_commands.json ]]; then
            echo "compile_commands.json was not generated or is empty" >&2
            exit 1
          fi

      # ── Coverage collection ───────────────────────────────────────
      # C coverage: build NGINX from source with --coverage, run a
      # smoke e2e scenario, and collect gcov data for all 20+ module
      # source files.
      - name: Generate C module e2e coverage
        if: steps.token.outputs.enabled == 'true'
        run: make coverage-c

      - name: Cache Rust build artifacts
        if: steps.token.outputs.enabled == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target
          cache-bin: false

      - name: Generate Rust test coverage
        if: steps.token.outputs.enabled == 'true'
        run: make coverage-rust

      - name: Convert lcov reports to SonarQube XML
        if: steps.token.outputs.enabled == 'true'
        run: make coverage-sonar-xml

      - name: Verify coverage reports exist
        if: steps.token.outputs.enabled == 'true'
        shell: bash
        run: |
          if [[ ! -s coverage/sonar-coverage.xml ]]; then
            echo "ERROR: coverage/sonar-coverage.xml missing or empty" >&2
            exit 1
          fi
          echo "OK: coverage/sonar-coverage.xml ($(wc -l < coverage/sonar-coverage.xml) lines)"

      - name: Validate generated source encodings
        if: steps.token.outputs.enabled == 'true'
        run: >
          python3 tools/sonar/check_source_encoding.py
          --include-exceptions
          --include-generated

      - name: SonarCloud Scan
        if: steps.token.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        with:
          args: >
            -Dproject.settings=.sonarcloud.properties
            -Dsonar.organization=cnkang
            -Dsonar.projectKey=cnkang_nginx-markdown-for-agents
