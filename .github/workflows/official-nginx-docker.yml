name: Official NGINX Docker Validation

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - "Makefile"
      - "components/nginx-module/**"
      - "components/rust-converter/**"
      - "examples/docker/**"
      - "tools/ci/verify_official_nginx_docker.sh"
      - ".github/workflows/official-nginx-docker.yml"
  push:
    branches: [main, master]
    paths:
      - "Makefile"
      - "components/nginx-module/**"
      - "components/rust-converter/**"
      - "examples/docker/**"
      - "tools/ci/verify_official_nginx_docker.sh"
      - ".github/workflows/official-nginx-docker.yml"

permissions: {}

concurrency:
  group: official-nginx-docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: Build + Functional Check (${{ matrix.nginx_tag }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - nginx_tag: mainline
            arch: amd64
            runner: ubuntu-latest
            port: 18080
          - nginx_tag: mainline
            arch: arm64
            runner: ubuntu-24.04-arm
            port: 18080
          - nginx_tag: mainline-alpine
            arch: amd64
            runner: ubuntu-latest
            port: 18081
          - nginx_tag: mainline-alpine
            arch: arm64
            runner: ubuntu-24.04-arm
            port: 18081
          - nginx_tag: stable
            arch: amd64
            runner: ubuntu-latest
            port: 18082
          - nginx_tag: stable
            arch: arm64
            runner: ubuntu-24.04-arm
            port: 18082
          - nginx_tag: stable-alpine
            arch: amd64
            runner: ubuntu-latest
            port: 18083
          - nginx_tag: stable-alpine
            arch: arm64
            runner: ubuntu-24.04-arm
            port: 18083

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Resolve source clone target
        id: source
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_REPO: ${{ github.event.pull_request.head.repo.clone_url || '' }}
          PR_REF: ${{ github.event.pull_request.head.ref || '' }}
          PR_SHA: ${{ github.event.pull_request.head.sha || '' }}
          DEFAULT_REPO: ${{ github.server_url }}/${{ github.repository }}.git
          DEFAULT_REF: ${{ github.ref_name }}
          DEFAULT_SHA: ${{ github.sha }}
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            {
              printf 'repo=%s\n' "${PR_REPO}"
              printf 'ref=%s\n' "${PR_REF}"
              printf 'sha=%s\n' "${PR_SHA}"
            } >> "$GITHUB_OUTPUT"
          else
            {
              printf 'repo=%s\n' "${DEFAULT_REPO}"
              printf 'ref=%s\n' "${DEFAULT_REF}"
              printf 'sha=%s\n' "${DEFAULT_SHA}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build from source on official nginx base
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./examples/docker/Dockerfile.official-nginx-source-build
          load: true
          tags: nginx-markdown-official-check:${{ matrix.nginx_tag }}-${{ matrix.arch }}
          build-args: |
            NGINX_IMAGE=nginx:${{ matrix.nginx_tag }}
            MODULE_REPO=${{ steps.source.outputs.repo }}
            MODULE_REF=${{ steps.source.outputs.ref }}
            MODULE_SHA=${{ steps.source.outputs.sha }}
          cache-from: type=gha,scope=official-nginx-docker-${{ matrix.nginx_tag }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=official-nginx-docker-${{ matrix.nginx_tag }}-${{ matrix.arch }}

      - name: Verify runtime behavior
        env:
          IMAGE_NAME: nginx-markdown-official-check:${{ matrix.nginx_tag }}-${{ matrix.arch }}
          JOB_NGINX_TAG: ${{ matrix.nginx_tag }}
          MODULE_REPO: ${{ steps.source.outputs.repo }}
          MODULE_REF: ${{ steps.source.outputs.ref }}
          MODULE_SHA: ${{ steps.source.outputs.sha }}
          ARTIFACT_DIR: ${{ runner.temp }}/official-nginx-docker/${{ matrix.nginx_tag }}-${{ matrix.arch }}
          JOB_PORT: ${{ matrix.port }}
        run: |
          bash ./tools/ci/verify_official_nginx_docker.sh \
            --skip-build \
            --image-name "${IMAGE_NAME}" \
            --nginx-tag "${JOB_NGINX_TAG}" \
            --module-repo "${MODULE_REPO}" \
            --module-ref "${MODULE_REF}" \
            --module-sha "${MODULE_SHA}" \
            --artifact-dir "${ARTIFACT_DIR}" \
            --port "${JOB_PORT}"

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: official-nginx-docker-${{ matrix.nginx_tag }}-${{ matrix.arch }}-failure
          path: ${{ runner.temp }}/official-nginx-docker/${{ matrix.nginx_tag }}-${{ matrix.arch }}
          if-no-files-found: ignore
