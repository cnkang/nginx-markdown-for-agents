name: Nightly Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: nightly-fuzz-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [parser_html, ffi_convert, security_validator]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: nightly

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            components/rust-converter -> target

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Run nightly fuzz target
        run: |
          cd components/rust-converter
          cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=300

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: nightly-fuzz-${{ matrix.target }}
          path: |
            components/rust-converter/fuzz/artifacts
            components/rust-converter/fuzz/corpus
