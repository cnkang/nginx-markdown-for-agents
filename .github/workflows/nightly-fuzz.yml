name: Nightly Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: nightly-fuzz-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [parser_html, ffi_convert, security_validator]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: nightly

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: |
            components/rust-converter -> target

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Run nightly fuzz target
        run: |
          cd components/rust-converter
          cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=60

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: nightly-fuzz-${{ matrix.target }}
          path: |
            components/rust-converter/fuzz/artifacts
            components/rust-converter/fuzz/corpus
