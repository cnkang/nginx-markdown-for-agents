name: ClusterFuzzLite PR Fuzz

on:
  pull_request:
    paths:
      - 'components/rust-converter/**'
      - 'fuzz/**'
      - '.clusterfuzzlite/**'
      - '.github/workflows/cflite_*.yml'
      - 'Makefile'
      - 'Cargo.lock'
      - 'components/rust-converter/Cargo.toml'
      - 'docs/harness/**'
      - 'tools/release/gates/**'

permissions:
  contents: read
  security-events: write

jobs:
  pr-fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        id: build
        with:
          language: rust
          sanitizer: address

      - uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        id: fuzz
        with:
          mode: code-change
          fuzz-seconds: 600
          sanitizer: address

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pr-fuzz-crashes
          path: ./out/artifacts

      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('./out/*.sarif') != ''
        with:
          sarif_file: ./out/
