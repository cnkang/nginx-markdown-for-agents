name: ClusterFuzzLite PR Fuzz

on:
  pull_request:
    paths:
      - 'components/rust-converter/**'
      - 'fuzz/**'
      - '.clusterfuzzlite/**'
      - '.github/workflows/cflite_*.yml'
      - 'Makefile'
      - 'Cargo.lock'
      - 'components/rust-converter/Cargo.toml'
      - 'docs/harness/**'
      - 'tools/release/gates/**'

permissions:
  contents: read
  security-events: write

jobs:
  pr-fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        id: build
        with:
          language: rust
          sanitizer: address
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        id: fuzz
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: code-change
          fuzz-seconds: 600
          sanitizer: address

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: failure()
        with:
          name: pr-fuzz-crashes
          path: ./out/artifacts

      - uses: github/codeql-action/upload-sarif@84498526a009a99c875e83ef4821a8ba52de7c22  # codeql-bundle-v2.25.5
        if: always() && hashFiles('./out/*.sarif') != ''
        with:
          sarif_file: ./out/
