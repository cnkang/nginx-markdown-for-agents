name: ClusterFuzzLite Batch Fuzz

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  batch-fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          language: rust
          sanitizer: address
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        if: vars.CFLITE_STORAGE_REPO != ''
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: batch
          fuzz-seconds: 1800
          sanitizer: address
          storage-repo: ${{ vars.CFLITE_STORAGE_REPO }}
          storage-repo-branch: ${{ vars.CFLITE_STORAGE_REPO_BRANCH || 'main' }}
          storage-repo-branch-coverage: ${{ vars.CFLITE_STORAGE_REPO_BRANCH_COVERAGE || 'coverage' }}

      - uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        if: vars.CFLITE_STORAGE_REPO == ''
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: batch
          fuzz-seconds: 1800
          sanitizer: address

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: failure()
        with:
          name: batch-fuzz-crashes
          path: ./out/artifacts

      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always() && hashFiles('./out/*.sarif') != ''
        with:
          sarif_file: ./out/
