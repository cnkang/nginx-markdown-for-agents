name: Security Static Analysis

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
      - "dev/*"
    paths:
      - ".github/workflows/**"
      - "components/**"
      - "tools/**"
      - "packaging/**"
      - "examples/**"
      - "charts/**"
      - "Makefile"
      - "build.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "AGENTS.md"
      - "docs/harness/**"
      - ".gitleaks.toml"
      - ".semgrep.yml"
      - "deny.toml"
  push:
    branches:
      - main
      - master
      - "dev/*"
    paths:
      - ".github/workflows/**"
      - "components/**"
      - "tools/**"
      - "packaging/**"
      - "examples/**"
      - "charts/**"
      - "Makefile"
      - "build.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "AGENTS.md"
      - "docs/harness/**"
      - ".gitleaks.toml"
      - ".semgrep.yml"
      - "deny.toml"

permissions: {}

concurrency:
  group: security-static-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate GitHub Actions workflows
        run: make security-actionlint

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Check tracked shell scripts
        run: make security-shellcheck

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install gitleaks
        run: |
          # v8.30.1
          go install github.com/zricethezav/gitleaks/v8@83d9cd684c87d95d656c1458ef04895a7f1cbd8e
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Scan current tree for secrets
        run: make security-gitleaks

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Semgrep CE
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user semgrep==1.166.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run focused Semgrep rules
        run: make security-semgrep

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install cargo-deny
        run: |
          cargo install cargo-deny --version 0.19.8 --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Check Rust dependency advisories and licenses
        run: make security-cargo-deny
