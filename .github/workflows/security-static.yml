name: Security Static Analysis

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/**"
      - "components/**"
      - "tools/**"
      - "packaging/**"
      - "examples/**"
      - "charts/**"
      - "Makefile"
      - "build.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "AGENTS.md"
      - "docs/harness/**"
      - ".gitleaks.toml"
      - ".semgrep.yml"
      - "deny.toml"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/**"
      - "components/**"
      - "tools/**"
      - "packaging/**"
      - "examples/**"
      - "charts/**"
      - "Makefile"
      - "build.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "AGENTS.md"
      - "docs/harness/**"
      - ".gitleaks.toml"
      - ".semgrep.yml"
      - "deny.toml"

permissions: {}

concurrency:
  group: security-static-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Validate GitHub Actions workflows
        shell: bash
        run: |
          mapfile -t workflow_files < <(
            find .github/workflows -maxdepth 1 -type f \( -name "*.yml" -o -name "*.yaml" \) | sort
          )
          if [[ "${#workflow_files[@]}" -eq 0 ]]; then
            echo "::error::No workflow files found under .github/workflows" >&2
            exit 1
          fi
          actionlint -color -shellcheck= "${workflow_files[@]}"

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Check tracked shell scripts
        shell: bash
        run: |
          tmp_files="$(mktemp)"
          trap 'rm -f "$tmp_files"' EXIT
          git ls-files -z -- \
            "*.sh" \
            "tools/**/*.sh" \
            "packaging/**/*.sh" \
            ".clusterfuzzlite/*.sh" \
            "examples/**/*.sh" > "$tmp_files"
          if [[ ! -s "$tmp_files" ]]; then
            echo "No tracked shell scripts matched the security-static scope."
            exit 0
          fi
          xargs -0 shellcheck --severity=error -x -P tools/e2e -P tools/lib < "$tmp_files"

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Scan current tree for secrets
        run: gitleaks detect --source . --no-git --redact --config .gitleaks.toml --verbose

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Semgrep CE
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user semgrep==1.166.0

      - name: Run focused Semgrep rules
        run: semgrep --config .semgrep.yml --error --metrics=off

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.8 --locked

      - name: Check Rust dependency advisories and licenses
        shell: bash
        run: |
          set -euo pipefail
          manifests=(
            "components/rust-converter/Cargo.toml"
            "tools/corpus/test-corpus-conversion/Cargo.toml"
          )
          for manifest in "${manifests[@]}"; do
            cargo deny --manifest-path "$manifest" check --config deny.toml advisories licenses bans sources
          done
