name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Git ref to build (e.g. v1.0.0, main, or commit SHA)'
        required: false
        default: ''

permissions: {}

jobs:
  prepare:
    name: Resolve Build Matrix from release-matrix.json
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix_entries: ${{ steps.resolve.outputs.matrix_entries }}
      checkout_ref: ${{ steps.checkout_ref.outputs.checkout_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.version || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.3'

      - name: Validate release matrix consumers
        run: |
          python3 tools/release/matrix/validate_workflow_matrix_consumers.py

      - name: Extract build matrix from release-matrix.json
        id: resolve
        run: |
          # Read release-binaries-owned supported entries from the checked-in
          # release matrix and output them for matrix.include consumption.
          python3 - <<'PY'
          import json, os

          with open("tools/release-matrix.json", "r") as f:
              data = json.load(f)

          def normalize_arch(arch):
              return {
                  "amd64": "x86_64",
                  "arm64": "aarch64",
              }.get(arch, arch)

          owner = ".github/workflows/release-binaries.yml"
          entries = [
              {
                  "nginx": e["nginx_version"],
                  "os_type": e["libc"],
                  "arch": normalize_arch(e["arch"]),
                  "support_tier": e["support_tier"],
              }
              for e in data.get("entries", [])
              if e.get("owner_workflow") == owner
              and e.get("support_tier") == "supported"
              and e.get("artifact_type") == "dynamic-module"
              and e.get("libc") in {"glibc", "musl"}
          ]

          if not entries:
              raise SystemExit(
                  "No supported release-binaries entries found in release-matrix.json"
              )

          # Sort for deterministic ordering
          entries.sort(key=lambda e: (
              tuple(int(p) for p in e["nginx"].split(".")),
              e["os_type"],
              e["arch"],
          ))

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"matrix_entries={json.dumps(entries)}\n")

          print(f"Resolved {len(entries)} build entries from release-matrix.json")
          PY

      - id: checkout_ref
        env:
          VERSION_INPUT: ${{ github.event.inputs.version || '' }}
          DEFAULT_REF: ${{ github.ref }}
        run: |
          ref="${DEFAULT_REF}"
          if [ -n "${VERSION_INPUT}" ]; then
            ref="${VERSION_INPUT}"
          fi
          echo "checkout_ref=${ref}" >> "$GITHUB_OUTPUT"

  build-binaries:
    name: Build - NGINX ${{ matrix.nginx }} - ${{ matrix.os_type }} - ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix_entries) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Module
        run: |
          ./tools/build_release.sh ${{ matrix.nginx }} ${{ matrix.os_type }} ${{ matrix.arch }}

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ngx_http_markdown_filter_module-${{ matrix.nginx }}-${{ matrix.os_type }}-${{ matrix.arch }}
          path: dist/${{ matrix.nginx }}-${{ matrix.os_type }}-${{ matrix.arch }}/*.tar.gz

  completeness-check:
    name: Verify Artifact Completeness
    needs: [prepare, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.3'

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Collect artifact filenames for completeness check
        run: |
          # download-artifact creates subdirectories per artifact name;
          # flatten all .tar.gz filenames into a list for the checker.
          find artifacts -name '*.tar.gz' -printf '%f\n' | sort > artifact-list.txt
          echo "Collected artifacts:"
          cat artifact-list.txt

      - name: Run completeness check
        run: |
          python3 tools/release/matrix/completeness_check.py \
            --matrix tools/release-matrix.json \
            --artifacts artifact-list.txt

  publish-release:
    name: Publish Binaries to Release
    needs: completeness-check
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.version, 'v'))
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.3'

      - name: Generate Grouped Version Manifest
        run: |
          python3 - <<'PY'
          import datetime
          import glob
          import json
          import os
          import re

          paths = glob.glob("artifacts/**/*.tar.gz", recursive=True)
          pattern = re.compile(
              r"ngx_http_markdown_filter_module-([0-9]+\.[0-9]+\.[0-9]+)-(glibc|musl)-(x86_64|aarch64)\.tar\.gz$"
          )

          by_series = {}
          for path in paths:
              name = os.path.basename(path)
              match = pattern.match(name)
              if not match:
                  continue
              version, os_type, arch = match.groups()
              series = ".".join(version.split(".")[:2])

              series_entry = by_series.setdefault(series, {"versions": {}, "latest": None})
              version_entry = series_entry["versions"].setdefault(version, [])
              target = f"{os_type}/{arch}"
              if target not in version_entry:
                  version_entry.append(target)

              if series_entry["latest"] is None:
                  series_entry["latest"] = version
              else:
                  current = tuple(int(p) for p in series_entry["latest"].split("."))
                  candidate = tuple(int(p) for p in version.split("."))
                  if candidate > current:
                      series_entry["latest"] = version

          for series in by_series.values():
              for version in series["versions"].values():
                  version.sort()

          grouped = {
              "generated_at_utc": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "series": dict(
                  sorted(
                      by_series.items(),
                      key=lambda item: tuple(int(p) for p in item[0].split(".")),
                  )
              ),
          }

          with open("artifacts/nginx-version-groups.json", "w", encoding="utf-8") as f:
              json.dump(grouped, f, indent=2, sort_keys=False)
              f.write("\n")

          lines = [
              "# NGINX Binary Version Groups",
              "",
              "Assets are grouped by major.minor for readability.",
              "Dynamic-module compatibility still requires exact patch matching.",
              "",
          ]
          for series, data in grouped["series"].items():
              lines.append(f"## {series}.x (latest: {data['latest']})")
              for version in sorted(
                  data["versions"].keys(),
                  key=lambda v: tuple(int(p) for p in v.split(".")),
              ):
                  targets = ", ".join(data["versions"][version])
                  lines.append(f"- `{version}` -> {targets}")
              lines.append("")

          with open("artifacts/nginx-version-groups.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          PY

      - name: Upload Assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/nginx-version-groups.json
            artifacts/nginx-version-groups.md
