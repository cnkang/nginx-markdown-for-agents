[graph]
all-features = true

[advisories]
unmaintained = "workspace"
unsound = "all"
ignore = []

[licenses]
unused-allowed-license = "warn"
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "NCSA",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
  # Backtracking regex engines — Rule 10 requires non-backtracking regex (regex crate).
  # These crates use PCRE-style backtracking which is vulnerable to ReDoS.
  # If a dependency requires one, it must have input size limits and adversarial tests.
  { name = "fancy-regex", reason = "Backtracking regex engine — vulnerable to ReDoS. Use 'regex' crate instead." },
  { name = "pcre2", reason = "Backtracking PCRE2 bindings — vulnerable to ReDoS. Use 'regex' crate instead." },
  { name = "pcre2-sys", reason = "Backtracking PCRE2 FFI bindings — vulnerable to ReDoS. Use 'regex' crate instead." },
  { name = "onig", reason = "Backtracking Oniguruma bindings — vulnerable to ReDoS. Use 'regex' crate instead." },
  { name = "onig_sys", reason = "Backtracking Oniguruma FFI bindings — vulnerable to ReDoS. Use 'regex' crate instead." },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
