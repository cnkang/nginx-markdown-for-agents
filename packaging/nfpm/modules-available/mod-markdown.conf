# NGINX Markdown for Agents module
# This module enables HTML-to-Markdown conversion for AI agent requests.
#
# To enable this module:
#   ln -sf /usr/share/nginx/modules-available/mod-markdown.conf /etc/nginx/modules-enabled/50-mod-markdown.conf
#   systemctl reload nginx
#
load_module modules/ngx_http_markdown_module.so;
