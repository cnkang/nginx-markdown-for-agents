# cbindgen configuration for automatic C header generation
# This generates the FFI boundary header for NGINX module integration

language = "C"
header = "/* Auto-generated by cbindgen - DO NOT EDIT MANUALLY */"
include_guard = "NGINX_MARKDOWN_CONVERTER_H"
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. */\n/* Any manual changes will be overwritten on next build. */"
pragma_once = false
include_version = true

[export]
# Export only items explicitly marked with #[unsafe(no_mangle)] (Rust 2024)
include = []
exclude = []

[export.rename]
# No renaming needed - use Rust names directly

[fn]
# Function naming and style
rename_args = "None"
args = "Auto"
sort_by = "None"

[struct]
# Struct naming and style
rename_fields = "None"
derive_eq = false
derive_neq = false

[enum]
# Enum configuration
rename_variants = "None"

[const]
# Constant configuration
allow_static_const = true

[defines]
# Preprocessor defines for conditional compilation
"target_os = windows" = "WINDOWS"
"target_os = linux" = "LINUX"
"target_os = macos" = "MACOS"
# Map the 'incremental' Cargo feature to the C preprocessor symbol used in
# ngx_http_markdown_conversion_impl.h to guard the incremental FFI API.
"feature = incremental" = "MARKDOWN_INCREMENTAL_ENABLED"

[parse]
# Parse configuration
parse_deps = false
include = []
exclude = []
clean = false
extra_bindings = []

[parse.expand]
# Expand macros with the incremental feature enabled so cbindgen can see all
# cfg-gated items and emit the correct #if defined(MARKDOWN_INCREMENTAL_ENABLED)
# guards in the generated header.
crates = []
all_features = false
default_features = true
features = ["incremental"]
