apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx-markdown.fullname" . }}-config
  labels:
    {{- include "nginx-markdown.labels" . | nindent 4 }}
data:
  nginx.conf: |
    {{- if and .Values.markdown.enabled (not .Values.markdown.loadModule) }}
    {{- fail "markdown.loadModule is required when markdown.enabled=true; use an image containing ngx_http_markdown_filter_module.so and set the in-container module path" }}
    {{- end }}
    {{- if and .Values.metrics.enabled (not .Values.markdown.enabled) }}
    {{- fail "metrics.enabled=true requires markdown.enabled=true because metrics directives are provided by the markdown module" }}
    {{- end }}
    {{- if and .Values.markdown.enabled .Values.markdown.loadModule }}
    load_module {{ .Values.markdown.loadModule }};
    {{- end }}
    worker_processes auto;
    pid /var/run/nginx.pid;
    events { worker_connections 1024; }
    http {
      client_body_temp_path /var/cache/nginx/client_body_temp;
      proxy_temp_path /var/cache/nginx/proxy_temp;
      fastcgi_temp_path /var/cache/nginx/fastcgi_temp;
      uwsgi_temp_path /var/cache/nginx/uwsgi_temp;
      scgi_temp_path /var/cache/nginx/scgi_temp;
      {{- if and .Values.markdown.enabled .Values.metrics.enabled }}
      markdown_metrics_shm_size {{ .Values.metrics.shmSize }};
      {{- end }}
      server {
        listen 8080;
        {{- if .Values.markdown.enabled }}
        markdown_filter on;
        markdown_limits memory={{ .Values.markdown.maxSize }} timeout={{ .Values.markdown.timeout }};
        markdown_error_policy {{ .Values.markdown.onError }};
        markdown_flavor {{ .Values.markdown.flavor }};
        {{- if .Values.markdown.tokenEstimate }}
        markdown_token_estimate on;
        {{- end }}
        {{- if not .Values.markdown.etag }}
        markdown_cache_validation off;
        {{- else }}
        markdown_cache_validation {{ .Values.markdown.conditionalRequests }};
        {{- end }}
        markdown_log_verbosity {{ .Values.markdown.logVerbosity }};
        {{- if .Values.markdown.streaming }}
        markdown_streaming {{ .Values.markdown.streaming.mode }};
        markdown_limits streaming_buffer={{ .Values.markdown.streaming.budget }};
        markdown_stream_threshold {{ .Values.markdown.streaming.threshold }};
        {{- if .Values.markdown.streaming.shadow }}
        markdown_streaming_shadow on;
        {{- end }}
        {{- end }}
        {{- if .Values.markdown.prune }}
        markdown_prune_noise {{ ternary "on" "off" .Values.markdown.prune.noise }};
        {{- if .Values.markdown.prune.selectors }}
        markdown_prune_selectors {{ .Values.markdown.prune.selectors }};
        {{- end }}
        {{- if .Values.markdown.prune.protectionSelectors }}
        markdown_prune_protection_selectors {{ .Values.markdown.prune.protectionSelectors }};
        {{- end }}
        {{- end }}
        {{- if .Values.markdown.contentTypes }}
        markdown_content_types {{ join " " .Values.markdown.contentTypes }};
        {{- end }}
        {{- if ne .Values.markdown.llm.provider "default" }}
        markdown_llm_provider {{ .Values.markdown.llm.provider }};
        {{- end }}
        {{- if .Values.markdown.llm.charsPerToken }}
        markdown_chars_per_token {{ .Values.markdown.llm.charsPerToken }};
        {{- end }}
        {{- end }}
        location / {
          root /usr/share/nginx/html;
        }
        {{- if and .Values.markdown.enabled .Values.metrics.enabled }}
        location = {{ .Values.metrics.uri }} {
          markdown_metrics;
          markdown_metrics_format {{ .Values.metrics.format }};
        }
        {{- end }}
      }
    }
