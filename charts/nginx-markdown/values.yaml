# Default values for nginx-markdown chart

replicaCount: 1

image:
  repository: nginx-markdown
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

# Optional user-managed volumes for custom images or deployments.
extraVolumes: []
extraVolumeMounts: []

# Health check probes
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

# NGINX Markdown module configuration
markdown:
  # Disabled by default so the chart can run with a stock NGINX image.
  # To enable the module, use an image that already contains
  # ngx_http_markdown_filter_module.so and set loadModule to its path.
  enabled: false
  maxSize: "10m"
  timeout: "5s"
  onError: "pass"
  flavor: "commonmark"
  tokenEstimate: false
  etag: true
  conditionalRequests: "full_support"
  logVerbosity: "info"
  bufferChunked: true
  autoDecompress: true

  # Absolute load_module path inside the container, for example:
  # /usr/lib/nginx/modules/ngx_http_markdown_filter_module.so
  loadModule: ""

  # Streaming configuration
  streaming:
    engine: "auto"
    budget: "2m"
    onError: "pass"
    threshold: "1m"
    shadow: false

  # Noise pruning
  prune:
    noise: true
    selectors: ""
    protectionSelectors: ""

  # Content-type routing
  contentTypes: []

  # LLM adapter
  llm:
    provider: "default"
    charsPerToken: 0

  # Unified memory budget
  memoryBudget: ""

# Metrics endpoint
metrics:
  # Requires markdown.enabled=true because markdown_metrics* directives are
  # provided by the markdown module.
  enabled: false
  uri: "/_markdown_metrics"
  format: "auto"
  shmSize: "8m"
