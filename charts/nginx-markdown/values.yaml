# Default values for nginx-markdown chart

replicaCount: 1

image:
  repository: nginx-markdown
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

# Health check probes
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

# NGINX Markdown module configuration
markdown:
  enabled: true
  maxSize: "10m"
  timeout: "5s"
  onError: "pass"
  flavor: "commonmark"
  tokenEstimate: false
  etag: true
  conditionalRequests: "full_support"
  logVerbosity: "info"
  bufferChunked: true
  autoDecompress: true

  # load_module path for the shared object
  loadModule: null

  # Streaming configuration
  streaming:
    engine: "auto"
    budget: "2m"
    onError: "pass"
    autoThreshold: "32k"
    shadow: false

  # Noise pruning (v0.6.0)
  prune:
    noise: true
    selectors: ""
    protectionSelectors: ""

  # Content-type routing (v0.6.0)
  contentTypes: []

  # LLM adapter (v0.6.0)
  llm:
    provider: "default"
    charsPerToken: 0

  # Unified memory budget (v0.6.0)
  memoryBudget: ""

# Metrics endpoint
metrics:
  enabled: false
  uri: "/_markdown_metrics"
  format: "auto"
  shmSize: "8m"
