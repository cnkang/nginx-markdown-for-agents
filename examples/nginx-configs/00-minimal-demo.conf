# Minimal Demo Configuration
# Verifies the module works using NGINX's built-in default welcome page.
# No external upstream, no Docker, no additional software required.
#
# Usage:
#   1. Install the module (tools/install.sh handles this automatically)
#   2. Copy this file or use it as reference
#   3. Reload NGINX: sudo nginx -t && sudo nginx -s reload
#   4. Verify: curl -sD - -o /dev/null -H "Accept: text/markdown" http://localhost/

# Load the markdown filter module (for manual setups only — the install script
# wires this automatically; include here if you are not using the installer).
#
# The path below is relative to the NGINX prefix directory and works for
# most source-built installations.  Common alternatives:
#   load_module /usr/lib/nginx/modules/ngx_http_markdown_filter_module.so;  # Debian/Ubuntu
#   load_module /usr/lib64/nginx/modules/ngx_http_markdown_filter_module.so; # RHEL/CentOS
#   load_module /usr/local/libexec/nginx/ngx_http_markdown_filter_module.so; # FreeBSD
#
# Run `nginx -V 2>&1 | grep modules-path` to find your modules directory.
# Omit this line entirely if your package manager loads modules automatically.
load_module modules/ngx_http_markdown_filter_module.so;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    markdown_filter on;  # Enable markdown conversion globally for this demo

    # Safe defaults
    markdown_max_size 10m;   # Maximum response body size eligible for conversion
    markdown_timeout 5s;     # Maximum time allowed for a single conversion
    markdown_on_error pass;  # Fail-open: return original HTML on conversion error

    server {
        listen 80;

        # Serve files from the default NGINX document root
        # The default welcome page (index.html) is the demo content source
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
