# Bot-Targeted Markdown Conversion
#
# Serve Markdown to specific AI crawlers and agent bots based on User-Agent,
# while keeping HTML for browsers and all other clients.
#
# Why this pattern exists:
#   Most AI bots (ClaudeBot, GPTBot, etc.) do not send Accept: text/markdown.
#   They use standard browser-like Accept headers. This configuration injects
#   text/markdown into the Accept header at the NGINX layer for matching bots,
#   so the module's content negotiation handles the conversion transparently.
#
# Benefits:
#   - No application or module code changes required.
#   - Bot list is managed entirely through NGINX configuration.
#   - All standard eligibility checks (status, content type, size) still apply.
#   - Non-matching clients are completely unaffected.
#
# Customize:
#   - Replace example.com with your domain
#   - Replace 127.0.0.1:8080 with your backend address
#   - Add or remove User-Agent patterns in the map blocks below

load_module modules/ngx_http_markdown_filter_module.so;

http {
    include       mime.types;
    default_type  application/octet-stream;

    # --- Bot detection: rewrite Accept header for known AI bots ---
    map $http_user_agent $bot_accept_override {
        default         "";
        "~*ClaudeBot"   "text/markdown, text/html;q=0.9";
        "~*GPTBot"      "text/markdown, text/html;q=0.9";
        "~*Google-Extended"  "text/markdown, text/html;q=0.9";
        "~*Googlebot"   "text/markdown, text/html;q=0.9";
        "~*Bytespider"  "text/markdown, text/html;q=0.9";
        "~*CCBot"       "text/markdown, text/html;q=0.9";
        "~*ChatGPT-User" "text/markdown, text/html;q=0.9";
        "~*cohere-ai"   "text/markdown, text/html;q=0.9";
        "~*PerplexityBot" "text/markdown, text/html;q=0.9";
    }

    # Use override when present, otherwise keep original Accept
    map $bot_accept_override $final_accept {
        ""      $http_accept;
        default $bot_accept_override;
    }

    # --- Optional: also gate the filter itself per bot ---
    # Uncomment the following block if you want the module disabled entirely
    # for non-bot traffic (saves filter overhead for normal requests).
    #
    # map $http_user_agent $is_ai_bot {
    #     default         0;
    #     "~*ClaudeBot"   1;
    #     "~*GPTBot"      1;
    #     "~*Google-Extended"  1;
    #     "~*Googlebot"   1;
    #     "~*Bytespider"  1;
    #     "~*CCBot"       1;
    #     "~*ChatGPT-User" 1;
    #     "~*cohere-ai"   1;
    #     "~*PerplexityBot" 1;
    # }

    # Module defaults
    markdown_on_error pass;
    markdown_max_size 10m;
    markdown_timeout 5s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/markdown
               application/json application/javascript application/xml;

    upstream backend {
        server 127.0.0.1:8080;
    }

    server {
        listen 80;
        server_name example.com;

        location / {
            # Use "markdown_filter on;" to enable for all traffic (bot Accept
            # override still controls who actually gets Markdown).
            # Or use "markdown_filter $is_ai_bot;" to skip the filter for
            # non-bot requests entirely (uncomment the map block above).
            markdown_filter on;

            proxy_set_header Host $host;
            proxy_set_header Accept $final_accept;
            proxy_pass http://backend;
        }

        # Exclude API and static assets
        location /api/ {
            markdown_filter off;
            proxy_pass http://backend;
        }

        location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?|ttf)$ {
            markdown_filter off;
            expires 30d;
            proxy_pass http://backend;
        }

        # Metrics (localhost only)
        location /markdown-metrics {
            markdown_metrics;
            allow 127.0.0.1;
            allow ::1;
            deny all;
        }
    }
}
