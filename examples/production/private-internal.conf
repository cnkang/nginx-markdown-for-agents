# Internal documentation server — private network
# Profile: balanced (with auth_basic for access control)
# Features: auth_basic, trusted proxies, restricted metrics
#
# Verify: nginx -t -c /path/to/private-internal.conf
# SECURITY: A co-located TLS terminator is mandatory. It is the only
# client-facing endpoint and forwards to this loopback-only listener.
# Test:   curl -u admin:pass -H "Accept: text/markdown" https://internal.example.local/internal/
# ETag:   curl -u admin:pass -H "Accept: text/markdown" -H 'If-None-Match: "abc"' https://internal.example.local/internal/

worker_processes auto;
events {}

http {
    markdown_trusted_proxies 192.168.0.0/16 10.0.0.0/8;

    # Replace with your private documentation origin service.
    upstream upstream_internal {
        server 127.0.0.1:8082;
    }

    server {
        listen 127.0.0.1:8080;
        server_name internal.example.local;

        location / {
            auth_basic "Internal Docs";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://upstream_internal;
            markdown_filter on;
            markdown_profile balanced;
            markdown_limits memory=64m timeout=5s max_inflight=32;
            markdown_error_policy pass;
            markdown_cache_validation ims_only;
        }

        location /markdown-metrics {
            markdown_metrics;
            allow 127.0.0.1;
            deny all;
        }

        location /nginx-markdown/diagnostics {
            markdown_diagnostics on;
            markdown_diagnostics_allow 127.0.0.1;
        }
    }
}
