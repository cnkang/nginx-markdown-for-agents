# Documentation site — strict cache profile
# Profile: strict_cache (full ETag + conditional support)
# Features: cache_validation full, ETag generation, If-None-Match 304
#
# Verify: nginx -t -c /path/to/docs-strict-cache.conf
# Test:   curl -H "Accept: text/markdown" http://localhost/docs/
# 304:    curl -H "Accept: text/markdown" -H 'If-None-Match: W/"..."' http://localhost/docs/

worker_processes auto;
events {}

http {
    markdown_trusted_proxies 10.0.0.0/8;

    server {
        listen 80;
        server_name docs.example.com;

        location / {
            proxy_pass http://upstream_docs;
            markdown_filter on;
            markdown_profile strict_cache;
            markdown_cache_validation full;
            markdown_limits memory=128m timeout=10s max_inflight=32;
            markdown_error_policy pass;
            gzip on;
            gzip_types text/markdown text/html;
        }

        location /markdown-metrics {
            markdown_metrics;
            markdown_metrics_format prometheus;
            allow 127.0.0.1;
            allow ::1;
            deny all;
        }

        location /nginx-markdown/diagnostics {
            markdown_diagnostics on;
            markdown_diagnostics_allow 127.0.0.1;
        }
    }
}
