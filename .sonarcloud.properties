# SonarQube Cloud automatic analysis configuration
# This file is used by SonarQube Cloud Autoscan (not CI-based sonar-project.properties).
# Committed to git so scan scope is consistent across developers and CI.

# Scan production source paths in this repository.
sonar.sources=components/nginx-module,tools

# Mark test paths so test code is handled separately from source code.
sonar.tests=components/nginx-module/tests,tests

# Use UTF-8 consistently across source files.
sonar.sourceEncoding=UTF-8

# Keep C/C++ reporting aligned with the project's current standard.
sonar.cfamily.reportingCppStandardOverride=c++17

# ── Test corpus exclusions ──────────────────────────────────────────
# HTML fixtures under tests/corpus/ intentionally contain deprecated
# attributes (align=""), missing <th> headers, charset mismatches,
# commented-out example markup, and other non-standard patterns to
# exercise the converter's handling of real-world legacy content.
# Suppress HTML lint rules on these files.
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:S1827
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/corpus/**/*.html
sonar.issue.ignore.multicriteria.e2.ruleKey=Web:S125
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/corpus/**/*.html
sonar.issue.ignore.multicriteria.e3.ruleKey=Web:S5256
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/corpus/**/*.html
