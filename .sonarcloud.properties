# SonarQube Cloud analysis configuration
# Used as the project settings file for CI scans (via -Dproject.settings)
# and kept in git so scan scope is consistent across developers and CI.

# Scan production source paths in this repository.
# Keep tests out of source scope to avoid overlap failures.
# Exclude tools/e2e/** — those are E2E test verification scripts, not IaC,
# and the SonarCloud IaC shell parser cannot handle the local-assignment ||
# fallback pattern used throughout those scripts.
sonar.sources=components/nginx-module/src,components/nginx-module/config,tools
sonar.tests=components/nginx-module/tests,tests,tools
sonar.exclusions=components/nginx-module/tests/**,tools/**/tests/**,tools/e2e/**
sonar.test.inclusions=components/nginx-module/tests/**,tests/**,tools/**/tests/**
sonar.test.exclusions=tests/corpus/encoding/latin1.html

# Use UTF-8 consistently across source files.
sonar.sourceEncoding=UTF-8

# ── Coverage exclusions ─────────────────────────────────────────────
# Exclude tooling scripts and non-runtime code from coverage metrics.
# Tools remain in sonar.sources for static analysis, but the CI coverage
# workflow only reports the C module and rust-converter crates.
# Rust converter coverage is reported via cargo llvm-cov.
# C module coverage is partial: only files directly included by unit
# tests (via #include "../src/*.c" or _impl.h) produce gcov data.
# The remaining C files require full NGINX linkage and are covered
# by e2e/integration tests that do not produce gcov output.
sonar.coverage.exclusions=\
  tools/**/*.py,\
  tools/**/*.sh,\
  tools/**/*.rs,\
  tools/e2e/**,\
  tools/e2e-harness/**,\
  components/nginx-module/config,\
  components/nginx-module/src/*_impl.h

# Keep C/C++ reporting aligned with the project's current standard.
sonar.cfamily.reportingCppStandardOverride=c++17
# When running CI-based analysis, use compilation database for higher C quality.
sonar.cfamily.compile-commands=compile_commands.json

# ── Coverage report paths ───────────────────────────────────────────
# Generated by the sonarcloud CI workflow before the scan step.
# The converter script (tools/sonar/lcov_to_sonar_xml.py) merges all
# lcov reports into a single SonarQube Generic Coverage XML file.
sonar.coverageReportPaths=coverage/sonar-coverage.xml

# ── Test corpus exclusions ──────────────────────────────────────────
# HTML fixtures under tests/corpus/ intentionally contain deprecated
# attributes (align=""), missing <th> headers, charset mismatches,
# commented-out example markup, and other non-standard patterns to
# exercise the converter's handling of real-world legacy content.
# Suppress HTML lint rules on these files.
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:S1827
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/corpus/**/*.html
sonar.issue.ignore.multicriteria.e2.ruleKey=Web:S125
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/corpus/**/*.html
sonar.issue.ignore.multicriteria.e3.ruleKey=Web:S5256
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/corpus/**/*.html
